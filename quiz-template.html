<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customizable Quiz Application</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .quiz-container {
            max-width: 600px;
            margin: auto;
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 5px;
        }
        .question {
            margin-bottom: 15px;
        }
        .option {
            margin-bottom: 10px;
        }
        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <h1>Customizable Quiz</h1>
        <div class="question" id="question"></div>
        <div class="options"></div>
        <button id="submit">Submit</button>
        <div id="result"></div>
    </div>
    <script>
        const quizData = [
            {
                question: "What is the capital of France?",
                options: ["Paris", "London", "Rome", "Berlin"],
                answer: "Paris"
            },
            {
                question: "Which planet is known as the Red Planet?",
                options: ["Earth", "Mars", "Jupiter", "Saturn"],
                answer: "Mars"
            },
            {
                question: "Who wrote 'Hamlet'?",
                options: ["Shakespeare", "Dickens", "Hemingway", "Tolkien"],
                answer: "Shakespeare"
            }
        ];
        let currentQuestionIndex = 0;
        const questionElement = document.getElementById('question');
        const optionsElement = document.getElementsByClassName('options')[0];
        const resultElement = document.getElementById('result');

        function loadQuestion() {
            const currentQuestion = quizData[currentQuestionIndex];
            questionElement.innerText = currentQuestion.question;
            optionsElement.innerHTML = '';
            currentQuestion.options.forEach(option => {
                const button = document.createElement('button');
                button.innerText = option;
                button.classList.add('option');
                button.onclick = function() { 
                    checkAnswer(option);
                };
                optionsElement.appendChild(button);
            });
        }

        function checkAnswer(selectedOption) {
            const currentQuestion = quizData[currentQuestionIndex];
            if (selectedOption === currentQuestion.answer) {
                resultElement.innerText = 'Correct!';
            } else {
                resultElement.innerText = 'Wrong! The correct answer is ' + currentQuestion.answer;
            }
            currentQuestionIndex++; 
            if (currentQuestionIndex < quizData.length) {
                loadQuestion();
            } else {
                resultElement.innerText += '\n Quiz Completed!';
                document.getElementById('submit').style.display = 'none';
            }
        }

        loadQuestion();
    </script>
</body>
</html>
