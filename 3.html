<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trạng Nguyên Tiếng Việt Lớp 2 – Đề 3</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#FFF9C4 0%,#FFE0B2 50%,#E3F2FD 100%);min-height:100vh}
.screen{display:none;min-height:100vh;padding:16px}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center}
.start-card{background:#fff;border-radius:24px;padding:32px 24px;max-width:480px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.12);text-align:center}
.crown{font-size:64px;margin-bottom:8px;animation:bounce 1s infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-10px)}}
.title{font-size:22px;font-weight:800;color:#E53935;margin-bottom:4px}
.subtitle{font-size:15px;color:#1565C0;font-weight:600;margin-bottom:20px}
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:24px}
.chip{background:#E3F2FD;color:#1565C0;border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600}
.chip.g{background:#E8F5E9;color:#43A047}.chip.y{background:#FFF9C4;color:#F57F17}
.btn-start{background:linear-gradient(135deg,#E53935,#FFB300);color:#fff;border:none;border-radius:16px;padding:14px 40px;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(229,57,53,.35);transition:transform .15s}
.btn-start:hover{transform:scale(1.04)}
#quiz{padding:12px;justify-content:flex-start;padding-top:16px}
.quiz-wrap{max-width:560px;width:100%}
.top-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.q-num{font-size:13px;font-weight:700;color:#1565C0;white-space:nowrap}
.prog-bar{flex:1;height:10px;background:#E3F2FD;border-radius:5px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#42A5F5,#1565C0);border-radius:5px;transition:width .4s}
.score-badge{background:#FFB300;color:#fff;border-radius:12px;padding:3px 10px;font-size:13px;font-weight:700;white-space:nowrap}
.q-card{background:#fff;border-radius:20px;padding:20px;box-shadow:0 4px 16px rgba(0,0,0,.08);margin-bottom:12px}
.ctx-box{background:#FFF9C4;border-left:4px solid #FFB300;border-radius:8px;padding:12px;margin-bottom:14px;font-size:14px;color:#263238;line-height:1.6;white-space:pre-wrap}
.ctx-img{width:100%;border-radius:10px;margin-bottom:12px;display:block}
.q-text{font-size:16px;font-weight:700;color:#263238;margin-bottom:16px;line-height:1.5}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt{background:#F5F5F5;border:2px solid #E0E0E0;border-radius:12px;padding:12px;cursor:pointer;display:flex;align-items:flex-start;gap:10px;transition:all .15s;font-size:14px;color:#263238;text-align:left;line-height:1.4}
.opt:hover{border-color:#42A5F5;background:#E3F2FD}
.opt.correct{background:#E8F5E9!important;border-color:#43A047!important;color:#1B5E20!important}
.opt.wrong{background:#FFEBEE!important;border-color:#E53935!important;color:#B71C1C!important}
.opt.disabled{cursor:default;pointer-events:none}
.opt-lbl{background:#42A5F5;color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.opt.correct .opt-lbl{background:#43A047}.opt.wrong .opt-lbl{background:#E53935}
.opt-img-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.opt-img-item{border:3px solid #E0E0E0;border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color .15s}
.opt-img-item:hover{border-color:#42A5F5}
.opt-img-item.correct{border-color:#43A047;background:#E8F5E9}
.opt-img-item.wrong{border-color:#E53935;background:#FFEBEE}
.opt-img-item.disabled{cursor:default;pointer-events:none}
.opt-img-item img{width:100%;display:block;border-radius:7px}
.opt-img-label{text-align:center;font-weight:700;font-size:13px;padding:4px;color:#263238}
.pills{display:flex;flex-wrap:wrap;gap:10px}
.pill{background:#E3F2FD;border:2px solid #42A5F5;border-radius:20px;padding:8px 20px;cursor:pointer;font-size:15px;font-weight:600;color:#1565C0;transition:all .15s}
.pill:hover{background:#42A5F5;color:#fff}
.pill.correct{background:#E8F5E9;border-color:#43A047;color:#1B5E20}
.pill.wrong{background:#FFEBEE;border-color:#E53935;color:#B71C1C}
.pill.disabled{cursor:default;pointer-events:none}
.type-row{display:flex;gap:8px;align-items:center}
.type-input{flex:1;border:2px solid #E0E0E0;border-radius:10px;padding:10px 14px;font-size:15px;font-family:inherit;outline:none;transition:border .15s}
.type-input:focus{border-color:#42A5F5}
.type-input.correct{border-color:#43A047;background:#E8F5E9}
.type-input.wrong{border-color:#E53935;background:#FFEBEE}
.btn-check{background:#42A5F5;color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:15px;cursor:pointer;white-space:nowrap;font-weight:600}
.btn-check:disabled{background:#bbb;cursor:default}
.match-wrap{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.col-title{font-size:12px;font-weight:700;color:#1565C0;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.match-left-item{background:#F5F5F5;border:2px dashed #90CAF9;border-radius:10px;padding:10px;margin-bottom:8px}
.match-left-label{font-size:13px;font-weight:600;color:#263238;margin-bottom:6px;line-height:1.4}
.drop-zone{border:2px dashed #bbb;border-radius:8px;min-height:36px;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:12px;transition:all .15s;padding:4px;position:relative}
.drop-zone.has-item{border-color:#42A5F5;background:#E3F2FD}
.drop-zone.drag-over{border-color:#FFB300;background:#FFF9C4}
.drop-zone.match-correct{border-color:#43A047!important;background:#E8F5E9!important}
.drop-zone.match-wrong{border-color:#E53935!important;background:#FFEBEE!important}
.match-right-pool{display:flex;flex-direction:column;gap:8px}
.drag-item{background:#1565C0;color:#fff;border-radius:8px;padding:8px 10px;cursor:grab;font-size:13px;font-weight:600;user-select:none;text-align:center;line-height:1.3;position:relative}
.drag-item:active{cursor:grabbing}
.drag-item img{width:100%;border-radius:6px;max-height:80px;object-fit:contain;display:block}
.rm-btn{position:absolute;top:-7px;right:-7px;background:#E53935;color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;padding:0;z-index:2}
.btn-match-check{background:#43A047;color:#fff;border:none;border-radius:12px;padding:10px 24px;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px;width:100%}
.fb{border-radius:10px;padding:10px 14px;font-size:13px;margin-top:12px;line-height:1.5;display:none}
.fb.show{display:block}
.fb.ok{background:#E8F5E9;color:#1B5E20;border-left:4px solid #43A047}
.fb.no{background:#FFEBEE;color:#B71C1C;border-left:4px solid #E53935}
.btn-next{background:linear-gradient(135deg,#1565C0,#42A5F5);color:#fff;border:none;border-radius:12px;padding:12px 32px;font-size:16px;font-weight:700;cursor:pointer;margin-top:10px;width:100%;display:none}
.btn-next.show{display:block}
.result-card{background:#fff;border-radius:24px;padding:32px 24px;max-width:440px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.12);text-align:center}
.result-crown{font-size:72px;margin-bottom:8px}
.result-score{font-size:48px;font-weight:800;color:#E53935;margin-bottom:4px}
.result-total{font-size:16px;color:#888;margin-bottom:12px}
.result-title{font-size:24px;font-weight:700;color:#263238;margin-bottom:8px}
.result-stars{font-size:32px;margin-bottom:20px}
.result-wrong{font-size:14px;color:#888;margin-bottom:20px}
.btn-retry{background:linear-gradient(135deg,#E53935,#FFB300);color:#fff;border:none;border-radius:16px;padding:14px 40px;font-size:17px;font-weight:700;cursor:pointer}
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;overflow:hidden}
.cf{position:absolute;width:10px;height:10px;border-radius:2px;animation:fall linear forwards}
@keyframes fall{0%{opacity:1;transform:translateY(-10px) rotate(0deg)}100%{opacity:0;transform:translateY(110vh) rotate(720deg)}}
@media(max-width:400px){.opts{grid-template-columns:1fr}.match-wrap{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="start" class="screen active">
  <div class="start-card">
    <div class="crown">👑</div>
    <div class="title">Trạng Nguyên Tiếng Việt</div>
    <div class="subtitle">Lớp 2 – Đề 3</div>
    <div class="chips"><span class="chip">30 câu hỏi</span><span class="chip g">300 điểm</span><span class="chip y">4 dạng bài</span></div>
    <button class="btn-start" onclick="startQuiz()">🚀 Bắt đầu thi!</button>
  </div>
</div>
<div id="quiz" class="screen">
  <div class="quiz-wrap">
    <div class="top-bar">
      <span class="q-num" id="qnum">Câu 1/30</span>
      <div class="prog-bar"><div class="prog-fill" id="prog" style="width:0%"></div></div>
      <span class="score-badge" id="scorebadge">0đ</span>
    </div>
    <div class="q-card" id="qcard"></div>
    <button class="btn-next" id="btnnext" onclick="nextQ()">Câu tiếp theo ➡️</button>
  </div>
</div>
<div id="result" class="screen">
  <div class="confetti-container" id="cfcontainer"></div>
  <div class="result-card">
    <div class="result-crown" id="rcrown">👑</div>
    <div class="result-score" id="rscore">0</div>
    <div class="result-total">/ 300 điểm</div>
    <div class="result-title" id="rtitle">Trạng Nguyên</div>
    <div class="result-stars" id="rstars">⭐⭐⭐</div>
    <div class="result-wrong" id="rwrong"></div>
    <button class="btn-retry" onclick="restartQuiz()">🔄 Thi lại</button>
  </div>
</div>

var curQ=0,score=0,wrongs=0;

(function(){
  var actx=null;
  function getCtx(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx;}
  function tone(f,t,type,vol){var c=getCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=type||'sine';o.frequency.value=f;g.gain.setValueAtTime(vol||0.3,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+t);o.start();o.stop(c.currentTime+t);}
  function playOK(){tone(523,.1,'sine',.3);setTimeout(function(){tone(659,.1,'sine',.3);},100);setTimeout(function(){tone(784,.1,'sine',.3);},200);setTimeout(function(){tone(1047,.3,'sine',.3);},300);}
  function playNo(){tone(247,.2,'sawtooth',.3);setTimeout(function(){tone(208,.3,'sawtooth',.3);},200);}
  function playFanfare(){[523,659,784,1047,1319].forEach(function(f,i){setTimeout(function(){tone(f,.2,'triangle',.4);},i*120);});}
  var COLORS=['#E53935','#FFB300','#43A047','#1565C0','#42A5F5','#FF7043','#AB47BC'];
  function mkDot(big){var c=document.getElementById('cfcontainer');if(!c)return;var d=document.createElement('div');d.className='cf';d.style.cssText='left:'+Math.random()*100+'%;background:'+COLORS[Math.floor(Math.random()*COLORS.length)]+';animation-duration:'+(big?1.5+Math.random()*2:0.8+Math.random()*0.8)+'s;animation-delay:'+Math.random()*0.3+'s;width:'+(big?6+Math.random()*10:8+Math.random()*8)+'px;height:'+(big?6+Math.random()*10:8+Math.random()*8)+'px;border-radius:'+Math.random()*50+'%';c.appendChild(d);setTimeout(function(){try{c.removeChild(d);}catch(e){}},big?5000:2000);}
  function burst(){for(var i=0;i<18;i++)mkDot(false);}
  function confetti(){for(var i=0;i<80;i++)(function(i){setTimeout(function(){mkDot(true);},i*60);})(i);}
  function showScreen(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});document.getElementById(id).classList.add('active');}
  function normalize(s){return s.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\u0111/g,'d').replace(/[^a-z0-9 ]/g,'');}
  function showFb(ok,txt){var fb=document.getElementById('fb');fb.className='fb show '+(ok?'ok':'no');fb.innerHTML=(ok?'✅ ':'❌ ')+txt;document.getElementById('btnnext').className='btn-next show';}
  function loadQ(){
    var q=QUESTIONS[curQ];
    document.getElementById('qnum').textContent='Câu '+(curQ+1)+'/30';
    document.getElementById('prog').style.width=((curQ/30)*100)+'%';
    document.getElementById('scorebadge').textContent=score+'đ';
    document.getElementById('btnnext').className='btn-next';
    var h='';
    if(q.ctx)h+='<div class="ctx-box">'+q.ctx.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\n/g,'<br>')+'</div>';
    if(q.ci)h+='<img class="ctx-img" src="'+IMG[q.ci]+'" alt="">';
    h+='<div class="q-text">'+q.q+'</div>';
    if(q.t==='mcq')h+=bMCQ(q);
    else if(q.t==='mcq_img')h+=bMCQImg(q);
    else if(q.t==='fill')h+=bFill(q);
    else if(q.t==='type')h+=bType();
    else if(q.t==='match')h+=bMatch();
    h+='<div class="fb" id="fb"></div>';
    document.getElementById('qcard').innerHTML=h;
    if(q.t==='match')initMatch(q);
    if(q.t==='type')document.getElementById('typeinput').addEventListener('keydown',function(e){if(e.key==='Enter')doCheckType();});
  }
  function bMCQ(q){var L=['A','B','C','D'],h='<div class="opts">';q.o.forEach(function(o,i){var txt=o.replace(/^[ABCD]\.\s*/,'');h+='<div class="opt" id="opt'+i+'" onclick="pickMCQ('+i+')"><span class="opt-lbl">'+L[i]+'</span><span>'+txt+'</span></div>';});return h+'</div>';}
  function bMCQImg(q){var L=['A','B','C','D'],h='<div class="opt-img-grid">';q.imgs.forEach(function(key,i){h+='<div class="opt-img-item" id="oi'+i+'" onclick="pickMCQImg('+i+')" title="Hình '+L[i]+'"><img src="'+IMG[key]+'" alt="Hình '+L[i]+'"><div class="opt-img-label">'+L[i]+'</div></div>';});return h+'</div>';}
  function bFill(q){var h='<div class="pills">';q.opts.forEach(function(o){var s=o.replace(/'/g,'&#39;').replace(/"/g,'&quot;');h+='<div class="pill" data-val="'+s+'" onclick="pickFill(this)">'+o+'</div>';});return h+'</div>';}
  function bType(){return '<div class="type-row"><input class="type-input" id="typeinput" type="text" placeholder="Gõ đáp án..."><button class="btn-check" id="btncheck" onclick="doCheckType()">Kiểm tra ✅</button></div>';}
  function bMatch(){return '<div id="matchwrap"></div><button class="btn-match-check" id="btnmatch" style="display:none" onclick="doCheckMatch()">✅ Kiểm tra đáp án</button>';}
  window.pickMCQ=function(i){var q=QUESTIONS[curQ];document.querySelectorAll('.opt').forEach(function(o){o.classList.add('disabled');});var ok=(i===q.a);document.getElementById('opt'+i).classList.add(ok?'correct':'wrong');if(!ok){document.getElementById('opt'+q.a).classList.add('correct');wrongs++;playNo();}else{burst();playOK();score+=10;}showFb(ok,q.fb);document.getElementById('scorebadge').textContent=score+'đ';};
  window.pickMCQImg=function(i){var q=QUESTIONS[curQ];document.querySelectorAll('.opt-img-item').forEach(function(o){o.classList.add('disabled');});var ok=(i===q.a);document.getElementById('oi'+i).classList.add(ok?'correct':'wrong');if(!ok){document.getElementById('oi'+q.a).classList.add('correct');wrongs++;playNo();}else{burst();playOK();score+=10;}showFb(ok,q.fb);document.getElementById('scorebadge').textContent=score+'đ';};

  window.doCheckType=function(){var q=QUESTIONS[curQ];var inp=document.getElementById('typeinput');var ok=normalize(inp.value)===normalize(q.a);inp.className='type-input '+(ok?'correct':'wrong');inp.disabled=true;document.getElementById('btncheck').disabled=true;if(!ok){wrongs++;playNo();showFb(false,q.fb+' (Đáp án đúng: '+q.a+')');}else{burst();playOK();score+=10;showFb(true,q.fb);}document.getElementById('scorebadge').textContent=score+'đ';};
  var _dragEl=null,_touchEl=null,_touchClone=null;
  function initMatch(q){
    var wrap=document.getElementById('matchwrap');
    var order=q.right.map(function(_,i){return i;});
    for(var i=order.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=order[i];order[i]=order[j];order[j]=t;}
    var h='<div class="match-wrap"><div><div class="col-title">Cột A</div>';
    q.left.forEach(function(l,i){h+='<div class="match-left-item"><div class="match-left-label">'+l+'</div><div class="drop-zone" id="dz'+i+'" data-idx="'+i+'">Kéo vào đây…</div></div>';});
    h+='</div><div><div class="col-title">Cột B</div><div class="match-right-pool" id="pool">';
    order.forEach(function(ri){var r=q.right[ri];var inner=r.img?'<img src="'+IMG[r.img]+'" alt="">':r.txt;h+='<div class="drag-item" draggable="true" data-ri="'+ri+'" id="di'+ri+'">'+inner+'</div>';});
    h+='</div></div></div>';
    wrap.innerHTML=h;
    q.left.forEach(function(_,i){var dz=document.getElementById('dz'+i);dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('drag-over');});dz.addEventListener('dragleave',function(){dz.classList.remove('drag-over');});dz.addEventListener('drop',function(e){e.preventDefault();doDrop(i);});});
    wrap.querySelectorAll('.drag-item').forEach(function(el){el.addEventListener('dragstart',function(e){_dragEl=el;e.dataTransfer.effectAllowed='move';});el.addEventListener('dragend',function(){_dragEl=null;document.querySelectorAll('.drop-zone').forEach(function(z){z.classList.remove('drag-over');});});el.addEventListener('touchstart',onTouchStart,{passive:false});});
    updateMatchBtn(q);
  }
  function doDrop(idx){if(!_dragEl)return;var dz=document.getElementById('dz'+idx);dz.classList.remove('drag-over');var old=dz.querySelector('.drag-item');if(old)returnToPool(old);var rm=_dragEl.querySelector('.rm-btn');if(rm)_dragEl.removeChild(rm);var rmBtn=document.createElement('button');rmBtn.className='rm-btn';rmBtn.innerHTML='✕';(function(el){rmBtn.onclick=function(e){e.stopPropagation();returnToPool(el);updateMatchBtn(QUESTIONS[curQ]);};}(_dragEl));_dragEl.appendChild(rmBtn);_dragEl.parentNode.removeChild(_dragEl);dz.innerHTML='';dz.appendChild(_dragEl);dz.classList.add('has-item');updateMatchBtn(QUESTIONS[curQ]);}
  function returnToPool(el){var rm=el.querySelector('.rm-btn');if(rm)el.removeChild(rm);var dz=el.closest('.drop-zone');if(dz){dz.innerHTML='Kéo vào đây…';dz.classList.remove('has-item','drag-over','match-correct','match-wrong');}document.getElementById('pool').appendChild(el);}
  function updateMatchBtn(q){var filled=document.querySelectorAll('.drop-zone.has-item').length;var btn=document.getElementById('btnmatch');if(btn)btn.style.display=(filled===q.left.length?'block':'none');}
  window.doCheckMatch=function(){var q=QUESTIONS[curQ];var allOk=true;q.left.forEach(function(_,li){var dz=document.getElementById('dz'+li);var item=dz.querySelector('.drag-item');if(!item){allOk=false;return;}var ok=(q.ans[li]===parseInt(item.dataset.ri));if(!ok)allOk=false;dz.classList.add(ok?'match-correct':'match-wrong');item.style.pointerEvents='none';var rm=item.querySelector('.rm-btn');if(rm)rm.style.display='none';});document.getElementById('btnmatch').style.display='none';if(allOk){burst();playOK();score+=10;showFb(true,q.fb);}else{wrongs++;playNo();showFb(false,q.fb);}document.getElementById('scorebadge').textContent=score+'đ';};
  function onTouchStart(e){if(e.touches.length!==1)return;e.preventDefault();_touchEl=e.currentTarget;var t=e.touches[0];_touchClone=_touchEl.cloneNode(true);_touchClone.style.cssText='position:fixed;opacity:.85;pointer-events:none;z-index:9999;width:'+_touchEl.offsetWidth+'px;top:'+(t.clientY-30)+'px;left:'+(t.clientX-_touchEl.offsetWidth/2)+'px;';document.body.appendChild(_touchClone);document.addEventListener('touchmove',onTouchMove,{passive:false});document.addEventListener('touchend',onTouchEnd);}
  function onTouchMove(e){e.preventDefault();var t=e.touches[0];_touchClone.style.top=(t.clientY-30)+'px';_touchClone.style.left=(t.clientX-_touchClone.offsetWidth/2)+'px';document.querySelectorAll('.drop-zone').forEach(function(z){z.classList.remove('drag-over');});var under=document.elementFromPoint(t.clientX,t.clientY);var dz=under&&(under.classList.contains('drop-zone')?under:(under.closest?under.closest('.drop-zone'):null));if(dz)dz.classList.add('drag-over');}
  function onTouchEnd(e){document.removeEventListener('touchmove',onTouchMove);document.removeEventListener('touchend',onTouchEnd);if(_touchClone){document.body.removeChild(_touchClone);_touchClone=null;}var t=e.changedTouches[0];var under=document.elementFromPoint(t.clientX,t.clientY);var dz=under&&(under.classList.contains('drop-zone')?under:(under.closest?under.closest('.drop-zone'):null));if(dz){var idx=parseInt(dz.dataset.idx);_dragEl=_touchEl;doDrop(idx);}_touchEl=null;_dragEl=null;document.querySelectorAll('.drop-zone').forEach(function(z){z.classList.remove('drag-over');});}
  window.startQuiz=function(){curQ=0;score=0;wrongs=0;showScreen('quiz');loadQ();};

  function showResult(){playFanfare();confetti();document.getElementById('rscore').textContent=score;var p=score/300,title,crown,stars;if(p===1){title='Trạng Nguyên';crown='👑';stars='⭐⭐⭐';}else if(p>=0.8){title='Xuất sắc';crown='🥇';stars='⭐⭐⭐';}else if(p>=0.6){title='Khá giỏi';crown='🥈';stars='⭐⭐';}else if(p>=0.4){title='Cố lên';crown='🥉';stars='⭐';}else{title='Ôn thêm nhé';crown='📚';stars='✨';}document.getElementById('rcrown').textContent=crown;document.getElementById('rtitle').textContent=title;document.getElementById('rstars').textContent=stars;document.getElementById('rwrong').textContent=wrongs>0?'Số câu sai: '+wrongs:'Tất cả đều đúng! 🎉';showScreen('result');}
})();
</script>
<script>
// tn-highscore-sync
(function() {
  const match = window.location.pathname.match(/(\d+)\.html$/);
  if (!match) return;

  const deNumber = parseInt(match[1], 10);
  const storageKey = `tn_lop2_de_${deNumber}_highscore`;
  const resultEl = document.getElementById('result');
  const pointsEl = document.getElementById('rpts');

  if (!resultEl || !pointsEl) return;

  function saveHighScore() {
    const scoreText = (pointsEl.textContent || '').replace(/[^\d]/g, '');
    const score = parseInt(scoreText, 10);
    if (Number.isNaN(score)) return;

    const prev = parseInt(localStorage.getItem(storageKey) || '0', 10);
    if (score > prev) {
      localStorage.setItem(storageKey, String(score));
    }
  }

  const pointObserver = new MutationObserver(saveHighScore);
  pointObserver.observe(pointsEl, { childList: true, characterData: true, subtree: true });

  const resultObserver = new MutationObserver(function() {
    if (window.getComputedStyle(resultEl).display !== 'none') {
      saveHighScore();
    }
  });
  resultObserver.observe(resultEl, { attributes: true, attributeFilter: ['style', 'class'] });

  window.addEventListener('beforeunload', saveHighScore);
})();
</script>
