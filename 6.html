<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trạng Nguyên Tiếng Việt - Lớp 2 – Đề 6</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#FFF9C4 0%,#FFE0B2 50%,#E3F2FD 100%);min-height:100vh}
.screen{display:none;min-height:100vh;padding:16px}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center}
.start-card{background:#fff;border-radius:24px;padding:32px 24px;max-width:480px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.12);text-align:center}
.crown{font-size:64px;margin-bottom:8px;animation:bounce 1s infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-10px)}}
.title{font-size:22px;font-weight:800;color:#E53935;margin-bottom:4px}
.subtitle{font-size:15px;color:#1565C0;font-weight:600;margin-bottom:20px}
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:24px}
.chip{background:#E3F2FD;color:#1565C0;border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600}
.chip.g{background:#E8F5E9;color:#43A047}.chip.y{background:#FFF9C4;color:#F57F17}
.btn-start{background:linear-gradient(135deg,#E53935,#FFB300);color:#fff;border:none;border-radius:16px;padding:14px 40px;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(229,57,53,.35);transition:transform .15s}
.btn-start:hover{transform:scale(1.04)}
#quiz{padding:12px;justify-content:flex-start;padding-top:16px}
.quiz-wrap{max-width:560px;width:100%}
.top-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.q-num{font-size:13px;font-weight:700;color:#1565C0;white-space:nowrap}
.prog-bar{flex:1;height:10px;background:#E3F2FD;border-radius:5px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#42A5F5,#1565C0);border-radius:5px;transition:width .4s}
.score-badge{background:#FFB300;color:#fff;border-radius:12px;padding:3px 10px;font-size:13px;font-weight:700;white-space:nowrap}
.q-card{background:#fff;border-radius:20px;padding:20px;box-shadow:0 4px 16px rgba(0,0,0,.08);margin-bottom:12px}
.ctx-box{background:#FFF9C4;border-left:4px solid #FFB300;border-radius:8px;padding:12px;margin-bottom:14px;font-size:14px;color:#263238;line-height:1.7;white-space:pre-wrap}
.ctx-img{width:100%;border-radius:10px;margin-bottom:12px;display:block;max-height:320px;object-fit:contain}
.q-text{font-size:16px;font-weight:700;color:#263238;margin-bottom:16px;line-height:1.5}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt{background:#F5F5F5;border:2px solid #E0E0E0;border-radius:12px;padding:12px;cursor:pointer;display:flex;align-items:flex-start;gap:10px;transition:all .15s;font-size:14px;color:#263238;text-align:left;line-height:1.4}
.opt:hover{border-color:#42A5F5;background:#E3F2FD}
.opt.correct{background:#E8F5E9!important;border-color:#43A047!important;color:#1B5E20!important}
.opt.wrong{background:#FFEBEE!important;border-color:#E53935!important;color:#B71C1C!important}
.opt.disabled{cursor:default;pointer-events:none}
.opt-lbl{background:#42A5F5;color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.opt.correct .opt-lbl{background:#43A047}.opt.wrong .opt-lbl{background:#E53935}
.pills{display:flex;flex-wrap:wrap;gap:10px}
.pill{background:#E3F2FD;border:2px solid #42A5F5;border-radius:20px;padding:8px 20px;cursor:pointer;font-size:15px;font-weight:600;color:#1565C0;transition:all .15s}
.pill:hover{background:#42A5F5;color:#fff}
.pill.correct{background:#E8F5E9;border-color:#43A047;color:#1B5E20}
.pill.wrong{background:#FFEBEE;border-color:#E53935;color:#B71C1C}
.pill.disabled{cursor:default;pointer-events:none}
.multitype-wrap{display:flex;flex-direction:column;gap:10px;margin-bottom:8px}
.multitype-row{display:flex;align-items:center;gap:8px;font-size:14px}
.multitype-row label{font-weight:700;color:#1565C0;min-width:60px}
.multitype-row input{border:2px solid #E0E0E0;border-radius:10px;padding:8px 12px;font-size:15px;font-family:inherit;outline:none;transition:border .15s;width:110px}
.multitype-row input:focus{border-color:#42A5F5}
.multitype-row input.correct{border-color:#43A047;background:#E8F5E9}
.multitype-row input.wrong{border-color:#E53935;background:#FFEBEE}
.multitype-row .hint{font-size:12px;color:#888}
.type-row{display:flex;gap:8px;align-items:center}
.type-input{flex:1;border:2px solid #E0E0E0;border-radius:10px;padding:10px 14px;font-size:15px;font-family:inherit;outline:none;transition:border .15s}
.type-input:focus{border-color:#42A5F5}
.type-input.correct{border-color:#43A047;background:#E8F5E9}
.type-input.wrong{border-color:#E53935;background:#FFEBEE}
.btn-check{background:#42A5F5;color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:15px;cursor:pointer;white-space:nowrap;font-weight:600}
.btn-check:disabled{background:#bbb;cursor:default}
.match-wrap{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.col-title{font-size:12px;font-weight:700;color:#1565C0;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.match-left-item{background:#F5F5F5;border:2px dashed #90CAF9;border-radius:10px;padding:10px;margin-bottom:8px}
.match-left-label{font-size:13px;font-weight:600;color:#263238;margin-bottom:6px;line-height:1.4}
.drop-zone{border:2px dashed #bbb;border-radius:8px;min-height:44px;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:12px;transition:all .15s;padding:4px;position:relative}
.drop-zone.has-item{border-color:#42A5F5;background:#E3F2FD}
.drop-zone.drag-over{border-color:#FFB300;background:#FFF9C4}
.drop-zone.match-correct{border-color:#43A047!important;background:#E8F5E9!important}
.drop-zone.match-wrong{border-color:#E53935!important;background:#FFEBEE!important}
.match-right-pool{display:flex;flex-direction:column;gap:8px}
.drag-item{background:#1565C0;color:#fff;border-radius:8px;padding:8px 10px;cursor:grab;font-size:13px;font-weight:600;user-select:none;text-align:center;line-height:1.3;position:relative}
.drag-item img{width:100%;border-radius:6px;max-height:90px;object-fit:contain;display:block}
.drag-item:active{cursor:grabbing}
.rm-btn{position:absolute;top:-7px;right:-7px;background:#E53935;color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;z-index:2}
.imgmatch-wrap{display:flex;gap:16px;flex-wrap:wrap}
.imgmatch-left{flex:1;min-width:200px}
.imgmatch-right{flex:0 0 140px}
.imgmatch-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.imgmatch-img-box{width:70px;height:60px;display:flex;align-items:center;justify-content:center;background:#F0F4FF;border-radius:8px;border:2px solid #90CAF9;flex-shrink:0}
.imgmatch-img{max-width:66px;max-height:56px;object-fit:contain;border-radius:4px}
.imgmatch-drop{flex:1;min-height:44px;border:2px dashed #90CAF9;border-radius:8px;display:flex;align-items:center;justify-content:center;background:#fff;font-size:13px;color:#90A4AE;transition:all .15s;padding:4px 8px}
.imgmatch-drop.drag-over{border-color:#FFB300;background:#FFF9C4}
.imgmatch-drop.match-correct{border-color:#43A047!important;background:#E8F5E9!important}
.imgmatch-drop.match-wrong{border-color:#E53935!important;background:#FFEBEE!important}
.btn-match-check{background:#43A047;color:#fff;border:none;border-radius:12px;padding:10px 24px;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px;width:100%}
.classify-pool{display:flex;flex-wrap:wrap;gap:8px;padding:10px;background:#F0F4FF;border-radius:12px;min-height:48px;margin-bottom:12px;border:2px dashed #90CAF9}
.classify-pool-title{font-size:11px;font-weight:700;color:#1565C0;margin-bottom:6px;text-transform:uppercase}
.classify-zones{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.classify-zone{border:2px dashed #90CAF9;border-radius:10px;padding:8px;min-height:90px;background:#fff}
.classify-zone-title{font-size:11px;font-weight:700;color:#1565C0;text-align:center;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #E3F2FD;text-transform:uppercase}
.classify-zone.drag-over{border-color:#FFB300;background:#FFF9C4}
.classify-zone.zone-correct{border-color:#43A047!important;background:#E8F5E9!important}
.classify-zone.zone-wrong{border-color:#E53935!important;background:#FFEBEE!important}
.c-drag{background:#1565C0;color:#fff;border-radius:8px;padding:6px 10px;cursor:grab;font-size:12px;font-weight:600;user-select:none;display:inline-block;margin:2px;position:relative;line-height:1.3}
.c-drag:active{cursor:grabbing}
.c-rm{position:absolute;top:-6px;right:-6px;background:#E53935;color:#fff;border:none;border-radius:50%;width:16px;height:16px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;z-index:2}
.f3-pool{display:flex;flex-wrap:wrap;gap:8px;padding:10px;background:#F0F4FF;border-radius:12px;min-height:44px;margin-bottom:14px;border:2px dashed #90CAF9}
.f3-drag{background:#1565C0;color:#fff;border-radius:8px;padding:8px 14px;cursor:grab;font-size:14px;font-weight:600;user-select:none;position:relative}
.f3-drag:active{cursor:grabbing}
.f3-drag.used{opacity:0.35;cursor:default;pointer-events:none}
.f3-zones{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:4px}
.f3-zone{flex:1;min-width:100px;border:2px dashed #90CAF9;border-radius:10px;min-height:54px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff;transition:all .15s;padding:4px}
.f3-zone.drag-over{border-color:#FFB300;background:#FFF9C4}
.f3-zone.f3-correct{border-color:#43A047!important;background:#E8F5E9!important}
.f3-zone.f3-wrong{border-color:#E53935!important;background:#FFEBEE!important}
.f3-zone-lbl{font-size:11px;font-weight:700;color:#1565C0;margin-bottom:4px;text-transform:uppercase}
.f3-placed{background:#1565C0;color:#fff;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:600;position:relative;cursor:default}
.f3-rm{position:absolute;top:-7px;right:-7px;background:#E53935;color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;z-index:2}
.btn-classify-check{background:#43A047;color:#fff;border:none;border-radius:12px;padding:10px 24px;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px;width:100%}
.fb{border-radius:10px;padding:10px 14px;font-size:13px;margin-top:12px;line-height:1.5;display:none}
.fb.show{display:block}
.fb.ok{background:#E8F5E9;color:#1B5E20;border-left:4px solid #43A047}
.fb.no{background:#FFEBEE;color:#B71C1C;border-left:4px solid #E53935}
.btn-next{background:linear-gradient(135deg,#1565C0,#42A5F5);color:#fff;border:none;border-radius:12px;padding:12px 32px;font-size:16px;font-weight:700;cursor:pointer;margin-top:10px;width:100%;display:none}
.btn-next.show{display:block}
.result-card{background:#fff;border-radius:24px;padding:32px 24px;max-width:440px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.12);text-align:center}
.result-crown{font-size:72px;margin-bottom:8px}
.result-score{font-size:48px;font-weight:800;color:#E53935;margin-bottom:4px}
.result-total{font-size:16px;color:#888;margin-bottom:12px}
.result-title{font-size:24px;font-weight:700;color:#263238;margin-bottom:8px}
.result-stars{font-size:32px;margin-bottom:20px}
.result-wrong{font-size:14px;color:#888;margin-bottom:20px}
.btn-retry{background:linear-gradient(135deg,#E53935,#FFB300);color:#fff;border:none;border-radius:16px;padding:14px 40px;font-size:17px;font-weight:700;cursor:pointer}
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;overflow:hidden}
.cf{position:absolute;width:10px;height:10px;border-radius:2px;animation:fall linear forwards}
@keyframes fall{0%{opacity:1;transform:translateY(-10px) rotate(0deg)}100%{opacity:0;transform:translateY(110vh) rotate(720deg)}}
@media(max-width:400px){.opts{grid-template-columns:1fr}.match-wrap{grid-template-columns:1fr}.classify-zones{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="start" class="screen active">
  <div class="start-card">
    <div class="crown">👑</div>
    <div class="title">Trạng Nguyên Tiếng Việt</div>
    <div class="subtitle">Lớp 2 – Đề 6</div>
    <div class="chips">
      <span class="chip">30 câu hỏi</span>
      <span class="chip g">300 điểm</span>
      <span class="chip y">4 dạng bài</span>
    </div>
    <button class="btn-start" onclick="startQuiz()">🚀 Bắt đầu thi!</button>
  </div>
</div>
<div id="quiz" class="screen">
  <div class="quiz-wrap">
    <div class="top-bar">
      <span class="q-num" id="qnum">Câu 1/30</span>
      <div class="prog-bar"><div class="prog-fill" id="prog" style="width:0%"></div></div>
      <span class="score-badge" id="scorebadge">0</span>
    </div>
    <div class="q-card" id="qcard"></div>
    <button class="btn-next" id="btnnext" onclick="nextQ()">Câu tiếp theo ➜</button>
  </div>
</div>
<div id="result" class="screen">
  <div class="confetti-container" id="cfcontainer"></div>
  <div class="result-card">
    <div class="result-crown" id="rcrown">👑</div>
    <div class="result-score" id="rscore">0</div>
    <div class="result-total">/ 300 điểm</div>
    <div class="result-title" id="rtitle">Trạng Nguyên</div>
    <div class="result-stars" id="rstars">⭐⭐⭐</div>
    <div class="result-wrong" id="rwrong"></div>
    <button class="btn-retry" onclick="restartQuiz()">🔄 Thi lại</button>
  </div>
</div>
<script>

// ---- SOUND ENGINE ----
var AudioCtx = window.AudioContext || window.webkitAudioContext;
var actx = null;
function getACtx(){if(!actx) actx=new AudioCtx();return actx;}

function playCorrect(){
  try{
    var ctx=getACtx();
    var t=ctx.currentTime;
    var osc=ctx.createOscillator();
    var gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.type='sine';
    osc.frequency.setValueAtTime(523,t);
    osc.frequency.setValueAtTime(659,t+0.1);
    osc.frequency.setValueAtTime(784,t+0.2);
    gain.gain.setValueAtTime(0.3,t);
    gain.gain.exponentialRampToValueAtTime(0.001,t+0.5);
    osc.start(t);osc.stop(t+0.5);
  }catch(e){}
}

function playWrong(){
  try{
    var ctx=getACtx();
    var t=ctx.currentTime;
    var osc=ctx.createOscillator();
    var gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.type='sawtooth';
    osc.frequency.setValueAtTime(300,t);
    osc.frequency.setValueAtTime(200,t+0.15);
    gain.gain.setValueAtTime(0.2,t);
    gain.gain.exponentialRampToValueAtTime(0.001,t+0.4);
    osc.start(t);osc.stop(t+0.4);
  }catch(e){}
}

function playClick(){
  try{
    var ctx=getACtx();
    var t=ctx.currentTime;
    var osc=ctx.createOscillator();
    var gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.type='sine';osc.frequency.value=440;
    gain.gain.setValueAtTime(0.1,t);
    gain.gain.exponentialRampToValueAtTime(0.001,t+0.08);
    osc.start(t);osc.stop(t+0.08);
  }catch(e){}
}

function playFinish(){
  try{
    var ctx=getACtx();
    var notes=[523,587,659,698,784,880,988,1047];
    notes.forEach((freq,i)=>{
      var t=ctx.currentTime+i*0.12;
      var osc=ctx.createOscillator();
      var gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.type='sine';osc.frequency.value=freq;
      gain.gain.setValueAtTime(0.25,t);
      gain.gain.exponentialRampToValueAtTime(0.001,t+0.3);
      osc.start(t);osc.stop(t+0.3);
    });
  }catch(e){}
}

{t:"mcq",q:"Dấu chấm than thích hợp để kết thúc dòng nào dưới đây?",o:["A. Chú gà trống cất tiếng gáy vang gọi mọi người thức dậy","B. Chú gà trống vừa cất tiếng gáy phải không","C. Dưới ánh nắng, bộ lông của chú gà trống mới rực rỡ làm sao","D. Chú gà trống thức dậy từ sáng sớm"],a:2,fb:"Dấu chấm than dùng sau câu cảm thán: 'mới rực rỡ làm sao!'"},
// 2
{t:"mcq",q:"Những đồ vật nào có trong bức tranh phòng ngủ?\n(Chọn 2 đáp án đúng nhất)",o:["A. giường, gối, chăn","B. bếp ga, nồi, chảo","C. bàn phím, máy tính, chuột","D. xe đạp, mũ bảo hiểm"],a:0,fb:"Phòng ngủ thường có giường, gối, chăn."},
// 3
{t:"mcq",ctx:"Tin nhắn của Kim gửi anh Vũ:\n'3h chiều, ngày 5 tháng 1\nAnh ơi, gần nhà mình\nđang mở hội chợ xuân đón Tết lắm lượt. Cuối tuần này, anh đưa em\nđến đó chứ nhé!\nEm Kim'",q:"Trong lời nhắn trên, bạn Kim nhắn anh Vũ điều gì?",o:["A. Cuối tuần, hai anh em cùng đi chơi hội chợ xuân.","B. Cuối tuần, hai anh em cùng đi thả diều.","C. Cuối tuần, hai anh em cùng học nhóm.","D. Cuối tuần, hai anh em cùng đi chơi ở công viên."],a:0,fb:"Tin nhắn nói rõ 'hội chợ xuân' và nhờ anh đưa đi."},
// 4
{t:"mcq",q:"Từ ngữ nào dưới đây không cùng nhóm với các từ còn lại?",o:["A. chạy bộ","B. lương thiện","C. hiền hậu","D. dịu dàng"],a:0,fb:"'Chạy bộ' là hoạt động, còn lại (lương thiện, hiền hậu, dịu dàng) đều là từ chỉ đặc điểm tính cách."},
// 5
{t:"mcq",ctx:"Sau giờ tan học, mẹ hỏi em về những việc em và các bạn đã làm trong hoạt động chăm sóc cây xanh mà trường tổ chức.",q:"Câu nào dưới đây thích hợp để em trả lời mẹ?",o:["A. Những cây cổ thụ trường con toả bóng mát cả một góc sân mẹ ạ.","B. Chúng con thường cùng nhau đọc sách dưới gốc cây ạ.","C. Cây phượng trường con nở hoa đỏ rực, đẹp lắm mẹ ạ!","D. Chúng con đã tưới nước và nhặt rác dưới gốc cây ạ."],a:3,fb:"Câu D trả lời đúng câu hỏi 'đã làm gì trong hoạt động chăm sóc cây'."},
// 6
{t:"mcq",ctx:"Trưa đầy hương lúa\nNội ru bên thềm\nBé thiêm thiếp ngủ\nMơ cười thật xinh.\n(Dạ Thảo)",q:"Hình ảnh nào dưới đây thích hợp để minh hoạ cho đoạn thơ trên?",o:["A. Bà ru cháu ngủ trên chiếc võng bên cánh đồng lúa","B. Bé chơi đùa với bà trên sân nhà","C. Cánh đồng lúa vàng mùa gặt","D. Bé nô đùa dưới ánh nắng"],a:0,fb:"Đoạn thơ có: hương lúa, nội ru, bé ngủ → bà ru cháu ngủ gần cánh đồng lúa."},
// 7
{t:"mcq",q:"Câu tục ngữ nào dưới đây nói về tinh thần đoàn kết?",o:["A. Cái răng, cái tóc là góc con người.","B. Ngựa chạy có bầy, chim bay có bạn.","C. Ăn kĩ no lâu, cày sâu tốt lúa.","D. Có cày có thóc, có học có chữ."],a:1,fb:"'Ngựa chạy có bầy, chim bay có bạn' → đề cao tinh thần đoàn kết, có bạn bè đồng hành."},
// 8
{t:"mcq",q:"Câu nào dưới đây miêu tả đúng bé đang chơi trò bác sĩ với gấu bông?",o:["A. Hai anh em Minh và Kim cùng chơi trò tập làm bác sĩ.","B. Bé tập làm bác sĩ khám bệnh cho chú mèo nhỏ.","C. Bé tập làm bác sĩ, đeo ống nghe khám bệnh cho chú gấu bông.","D. Bé đóng vai bác sĩ tiêm thuốc cho chú gấu bông."],a:2,fb:"Hình ảnh bé đeo ống nghe khám cho gấu bông → đáp án C."},
// 9
{t:"mcq",ctx:"Quê hương mang nặng nghĩa tình.\nQuê hương tôi đó đẹp xinh tuyệt vời.\nQuê hương ta, đó là nơi\nChôn rau cắt rốn, người ơi, nhớ về.",q:"Đoạn thơ trên thể hiện tình cảm gì của tác giả?",o:["A. Kính trọng, ca ngợi những người đã có công dựng xây quê hương","B. Niềm hân hoan khi sắp được về thăm quê","C. Tình cảm yêu mến, kính trọng dành cho ông bà ở quê","D. Yêu mến, gắn bó và tự hào về quê hương"],a:3,fb:"'Đẹp xinh tuyệt vời', 'chôn rau cắt rốn' → yêu mến, gắn bó và tự hào về quê hương."},
// 10
{t:"mcq",q:"Câu nào dưới đây sử dụng hợp lí từ 'chăm chỉ'?",o:["A. Các chú bộ đội chăm chỉ xông pha ngoài chiến trường.","B. Tấm lòng chăm chỉ của bác Lương đã giúp đỡ rất nhiều gia đình.","C. Trong rừng bỗng vang lên một tiếng hát chăm chỉ.","D. Những chú ong chăm chỉ tìm hoa hút mật."],a:3,fb:"'Chăm chỉ' chỉ sự cần mẫn, siêng năng — dùng hợp lí nhất cho 'những chú ong chăm chỉ'."},
// 11
{t:"mcq",ctx:"(1) 'Mình' của sông là dòng nước uốn lượn giữa đôi bờ cát. (2) 'Da' của sông là màu nước trong xanh. (3) Tiếng nước chảy là 'giọng' sông cười. (4) Sông quê mình hiền lành, tốt bụng. (5) Dân quê mình gọi sông là bạn.\n(Theo Bùi Sơn Hải)",q:"Đọc đoạn văn trên và chọn đáp án đúng:",o:["A. Đoạn văn có 2 câu nêu đặc điểm.","B. Đoạn văn có 1 câu nêu đặc điểm và 3 câu giới thiệu.","C. Trong các từ in đậm có 1 từ chỉ sự vật.","D. Các từ in đậm trong đoạn văn đều là từ chỉ đặc điểm."],a:0,fb:"Câu (4) 'hiền lành, tốt bụng' và câu (2) 'trong xanh' là 2 câu nêu đặc điểm."},
// 12
{t:"mcq",ctx:"Áo vàng lại có quân hàm\nNgã tư tấp nập phố phường đông vui\nXe đi theo nhịp tiếng còi\nLàm người chỉ dẫn mọi người lại qua.",q:"Giải câu đố:",o:["A. Tài xế xe tải","B. Phi công","C. Công nhân vệ sinh","D. Cảnh sát giao thông"],a:3,fb:"Áo vàng, ngã tư, tiếng còi, chỉ dẫn → Cảnh sát giao thông."},
// 13
{t:"type",ctx:"Vì sao hỡi miền Nam yêu dấu\nNgười không hề tiếc máu (...) ?\nVì sao hỡi miền Nam chiến đấu\nNgười hiên ngang không chịu cúi mình?\n(Theo Tố Hữu)",q:"Điền từ còn thiếu vào chỗ trống: (...)",a:"xương",a2:"xuong",fb:"'Máu xương' — từ ghép chỉ sự hi sinh trong chiến đấu."},
// 14
{t:"type",q:"Điền từ còn thiếu vào chỗ trống để hoàn thành câu tục ngữ:\n\nCon hơn (...) là nhà có phúc.",a:"cha",fb:"'Con hơn cha là nhà có phúc' — tục ngữ nói về sự tiến bộ của thế hệ sau."},
// 15
{t:"multitype",ctx:"Bên bờ sông, một vài cơn gió lao [1] thổi, khẽ vờn qua những lọn tóc của mấy đứa trẻ đang say sưa ngắm [2].",q:"Điền 'sao' hoặc 'xao' thích hợp vào 2 chỗ trống:",inputs:[{label:"Ô [1]:",placeholder:"sao/xao",hint:"(gió lao ___)"},{ label:"Ô [2]:",placeholder:"sao/xao",hint:"(ngắm ___)"}],answers:["xao","sao"],fb:"[1] lao xao (gió thổi xao xác) — [2] ngắm sao (ngắm những ngôi sao)."},
// 16
{t:"type",q:"Điền số thích hợp vào chỗ trống:\n\nTừ các tiếng 'kiêu', 'sa', 'kì', 'mạc' có thể ghép được tất cả (...) từ.",a:"3",fb:"3 từ: sa mạc, kiêu sa, kiêu kì."},
// 17
{t:"type",ctx:"Kìa Mặt Trời mới ló\nTrên đầu chị tre xanh\nSương giăng đèn ngọn cỏ\nTia nắng chuyền long lanh.\n(Đỗ Toàn Diện)",q:"Trong đoạn thơ trên có (...) từ chỉ hoạt động.",a:"3",fb:"3 từ chỉ hoạt động: ló, giăng, chuyền."},
// 18
{t:"multitype",ctx:"Bên khung cửa sổ, Lan đang say sưa với cuốn sách mới [1] Ánh nắng ban mai khẽ len lỏi qua từng hàng cây [2] tán lá [3] chiếu vào nhà rồi đọng lại trên trang giấy như muốn cùng Lan đọc sách.",q:"Điền dấu câu thích hợp vào 3 ô trống:",inputs:[{label:"Ô [1]:",placeholder:"dấu...",hint:"(kết thúc câu)"},{ label:"Ô [2]:",placeholder:"dấu...",hint:"(ngăn cách)"},{ label:"Ô [3]:",placeholder:"dấu...",hint:"(ngăn cách)"}],answers:[".","," ,","],fb:"[1] dấu chấm (.) kết thúc câu — [2] và [3] dấu phẩy (,) ngăn cách các thành phần."},
// 19
{t:"type",q:"Từ bắt đầu bằng 'c' hoặc 'k' là tên một loài cây thân thẳng, lá mọc thành chùm ở ngọn, quả nhỏ mọc thành buồng, dùng để ăn trầu.\n\nĐáp án: quả (...)",a:"cau",fb:"Quả cau — dùng để ăn trầu, cây thân thẳng không phân cành."},
// 20
{t:"type",ctx:"Giữ nguyên dùng để đội đầu\nChe mưa che nắng, đi đâu ta cần\nBỏ sắc yếu ớt tay chân\nTiếng này trái ngược với già bạn ơi!",q:"Tiếng bỏ sắc là (...)",a:"non",fb:"'Nón' bỏ sắc → 'non' (trẻ non, trái ngược với già)."},

var curQ=0,score=0,wrong=0;
function startQuiz(){
  playClick();
  document.getElementById('start').classList.remove('active');
  document.getElementById('quiz').classList.add('active');
  curQ=0;score=0;wrong=0;showQ();
}
function showQ(){
  if(curQ>=QS.length){showResult();return;}
  var q=QS[curQ];
  document.getElementById('qnum').textContent='Câu '+(curQ+1)+'/'+QS.length;
  document.getElementById('prog').style.width=((curQ+1)/QS.length*100)+'%';
  document.getElementById('scorebadge').textContent=score;
  var html='';
  if(q.ctx) html+='<div class="ctx-box">'+q.ctx.replace(/\n/g,'<br>')+'</div>';
  html+='<div class="q-text">'+q.q.replace(/\n/g,'<br>')+'</div>';
  if(q.t==='mcq'){
    html+='<div class="opts">';
    q.o.forEach((opt,i)=>{html+='<div class="opt" onclick="pickMCQ('+i+')"><span class="opt-lbl">'+['A','B','C','D'][i]+'</span><span>'+opt+'</span></div>';});
    html+='</div>';
  } else if(q.t==='type'){
    html+='<div class="type-row"><input type="text" class="type-input" id="typeinp" placeholder="Nhập câu trả lời..."><button class="btn-check" onclick="checkType()">Kiểm tra</button></div>';
  } else if(q.t==='multitype'){
    html+='<div class="multitype-wrap">';
    q.inputs.forEach((inp,i)=>{html+='<div class="multitype-row"><label>'+inp.label+'</label><input type="text" id="mt'+i+'" placeholder="'+inp.placeholder+'" autocomplete="off"><span class="hint">'+inp.hint+'</span></div>';});
    html+='</div><button class="btn-check" style="margin-top:8px;width:100%" onclick="checkMultiType()">✔ Kiểm tra</button>';
  } else if(q.t==='imgmatch'){
    html+='<div class="imgmatch-wrap"><div class="imgmatch-left">';
    html+='<div class="col-title">Hình ảnh</div>';
    q.imgs.forEach((src,i)=>{
      html+='<div class="imgmatch-row"><div class="imgmatch-img-box"><img src="'+src+'" class="imgmatch-img"></div>';
      html+='<div class="drop-zone imgmatch-drop" data-idx="'+i+'" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">Thả vào đây</div></div>';
    });
    html+='</div><div class="imgmatch-right"><div class="col-title">Tên con vật</div><div class="match-right-pool" id="pool">';
    q.right.forEach((item,i)=>{html+='<div class="drag-item" draggable="true" ondragstart="dragStart(event)" data-ridx="'+i+'">'+item+'</div>';});
    html+='</div></div></div><button class="btn-match-check" onclick="checkImgMatch()">✔ Kiểm tra</button>';
  } else if(q.t==='match'){
    html+='<div class="match-wrap"><div><div class="col-title">Cột trái</div>';
    q.left.forEach((item,i)=>{html+='<div class="match-left-item"><div class="match-left-label">'+(i+1)+'. '+item+'</div><div class="drop-zone" data-idx="'+i+'" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">Thả vào đây</div></div>';});
    html+='</div><div><div class="col-title">Cột phải</div><div class="match-right-pool" id="pool">';
    q.right.forEach((item,i)=>{html+='<div class="drag-item" draggable="true" ondragstart="dragStart(event)" data-ridx="'+i+'">'+item+'</div>';});
    html+='</div></div></div><button class="btn-match-check" onclick="checkMatch()">✔ Kiểm tra</button>';
  } else if(q.t==='fill3'){
    html+='<div class="f3-pool-title">📦 Kéo từ vào ô:</div><div class="f3-pool" id="f3pool">';
    q.items.forEach((item,i)=>{html+='<div class="f3-drag" draggable="true" ondragstart="f3dragStart(event)" data-fidx="'+i+'">'+item+'</div>';});
    html+='</div><div class="f3-zones">';
    q.answers.forEach((_,i)=>{html+='<div class="f3-zone" id="f3z'+i+'" data-zidx="'+i+'" ondrop="f3drop(event)" ondragover="f3allow(event)" ondragleave="f3leave(event)"><div class="f3-zone-lbl">Ô ['+(i+1)+']</div></div>';});
    html+='</div><button class="btn-classify-check" onclick="checkFill3()">✔ Kiểm tra</button>';
  } else if(q.t==='classify'){
    html+='<div class="classify-pool-title">📦 Kho từ — kéo vào ô bên dưới:</div><div class="classify-pool" id="cpool">';
    q.items.forEach((item,i)=>{html+='<div class="c-drag" draggable="true" ondragstart="cdragStart(event)" data-cidx="'+i+'">'+item+'</div>';});
    html+='</div><div class="classify-zones">';
    q.zones.forEach((zone,zi)=>{html+='<div class="classify-zone" id="czone'+zi+'" data-zname="'+zone+'" ondrop="cdrop(event)" ondragover="callowDrop(event)" ondragleave="cdragLeave(event)"><div class="classify-zone-title">'+zone+'</div></div>';});
    html+='</div><button class="btn-classify-check" onclick="checkClassify()">✔ Kiểm tra</button>';
  }
  html+='<div class="fb" id="fb"></div>';
  document.getElementById('qcard').innerHTML=html;
  document.getElementById('btnnext').classList.remove('show');
}
function pickMCQ(i){
  var q=QS[curQ];
  document.querySelectorAll('.opt').forEach((opt,idx)=>{opt.classList.add('disabled');if(idx===q.a)opt.classList.add('correct');else if(idx===i&&i!==q.a)opt.classList.add('wrong');});
  if(i===q.a){score+=10;document.getElementById('scorebadge').textContent=score;showFB(true);}else{wrong++;showFB(false);}
}
function checkType(){
  var q=QS[curQ];var inp=document.getElementById('typeinp');var val=inp.value.trim().toLowerCase();
  inp.disabled=true;document.querySelector('.btn-check').disabled=true;
  var isOk=val===q.a.toLowerCase()||(q.a2&&val===q.a2.toLowerCase());
  if(isOk){inp.classList.add('correct');score+=10;document.getElementById('scorebadge').textContent=score;showFB(true);}
  else{inp.classList.add('wrong');wrong++;showFB(false);}
}
function checkMultiType(){
  var q=QS[curQ];var allOk=true;
  q.inputs.forEach((inp,i)=>{
    var el=document.getElementById('mt'+i);el.disabled=true;
    if(el.value.trim().toLowerCase()===q.answers[i].toLowerCase())el.classList.add('correct');
    else{el.classList.add('wrong');allOk=false;}
  });
  document.querySelector('button[onclick="checkMultiType()"]').disabled=true;
  if(allOk){score+=10;document.getElementById('scorebadge').textContent=score;showFB(true);}else{wrong++;showFB(false);}
}
var draggedItem=null;
function dragStart(e){draggedItem=e.target;e.dataTransfer.effectAllowed='move';}
function allowDrop(e){e.preventDefault();e.currentTarget.classList.add('drag-over');}
function dragLeave(e){e.currentTarget.classList.remove('drag-over');}
function drop(e){
  e.preventDefault();e.currentTarget.classList.remove('drag-over');var zone=e.currentTarget;
  if(!draggedItem)return;
  if(zone.querySelector('.drag-item'))document.getElementById('pool').appendChild(zone.querySelector('.drag-item'));
  var cl=draggedItem.cloneNode(true);cl.draggable=false;cl.ondragstart=null;
  var rb=document.createElement('button');rb.className='rm-btn';rb.textContent='×';
  rb.onclick=function(){var o=document.createElement('div');o.className='drag-item';o.draggable=true;o.ondragstart=dragStart;o.dataset.ridx=cl.dataset.ridx;o.innerHTML=cl.innerHTML.replace(/<button[^>]*>.*?<\/button>/g,'');document.getElementById('pool').appendChild(o);cl.remove();zone.classList.remove('has-item');};
  cl.appendChild(rb);zone.appendChild(cl);zone.classList.add('has-item');draggedItem.remove();draggedItem=null;
}
function checkImgMatch(){
  var q=QS[curQ];var ok=true;
  document.querySelectorAll('.imgmatch-drop').forEach((zone,i)=>{
    var item=zone.querySelector('.drag-item');if(!item){ok=false;return;}
    if(parseInt(item.dataset.ridx)===q.pairs[i][1])zone.classList.add('match-correct');
    else{zone.classList.add('match-wrong');ok=false;}
  });
  document.querySelectorAll('.drag-item').forEach(d=>d.draggable=false);
  document.querySelector('button[onclick="checkImgMatch()"]').disabled=true;
  if(ok){score+=10;document.getElementById('scorebadge').textContent=score;showFB(true);}else{wrong++;showFB(false);}
}
function checkMatch(){
  var q=QS[curQ];var ok=true;
  document.querySelectorAll('.drop-zone').forEach((zone,i)=>{
    var item=zone.querySelector('.drag-item');if(!item){ok=false;return;}
    if(parseInt(item.dataset.ridx)===q.pairs[i][1])zone.classList.add('match-correct');else{zone.classList.add('match-wrong');ok=false;}
  });
  document.querySelectorAll('.drag-item').forEach(d=>d.draggable=false);
  document.querySelector('.btn-match-check').disabled=true;
  if(ok){score+=10;document.getElementById('scorebadge').textContent=score;showFB(true);}else{wrong++;showFB(false);}
}
var cdraggedItem=null;
function cdragStart(e){cdraggedItem=e.target;e.dataTransfer.effectAllowed='move';}
function callowDrop(e){e.preventDefault();e.currentTarget.classList.add('drag-over');}
function cdragLeave(e){e.currentTarget.classList.remove('drag-over');}
function cdrop(e){
  e.preventDefault();e.currentTarget.classList.remove('drag-over');var zone=e.currentTarget;
  if(!cdraggedItem)return;
  var cl=cdraggedItem.cloneNode(true);cl.draggable=true;
  cl.ondragstart=function(ev){cdraggedItem=cl;ev.dataTransfer.effectAllowed='move';};
  var rb=document.createElement('button');rb.className='c-rm';rb.textContent='×';
  rb.onclick=function(){var o=document.createElement('div');o.className='c-drag';o.draggable=true;o.ondragstart=cdragStart;o.dataset.cidx=cl.dataset.cidx;o.textContent=cl.textContent.replace('×','').trim();document.getElementById('cpool').appendChild(o);cl.remove();};
  cl.appendChild(rb);zone.appendChild(cl);cdraggedItem.remove();cdraggedItem=null;
}
function checkClassify(){
  var q=QS[curQ];var ok=true;
  q.zones.forEach((zoneName,zi)=>{
    var zone=document.getElementById('czone'+zi);
    var items=Array.from(zone.querySelectorAll('.c-drag')).map(d=>d.textContent.replace('×','').trim());
    var expected=q.correct[zoneName];
    var zok=expected.every(e=>items.includes(e))&&items.filter(it=>it).every(it=>expected.includes(it));
    if(zok)zone.classList.add('zone-correct');else{zone.classList.add('zone-wrong');ok=false;}
  });
  document.querySelectorAll('.c-drag').forEach(d=>d.draggable=false);
  document.querySelector('.btn-classify-check').disabled=true;
  if(ok){score+=10;document.getElementById('scorebadge').textContent=score;showFB(true);}else{wrong++;showFB(false);}
}
var f3dragged=null;
function f3dragStart(e){f3dragged=e.target;e.dataTransfer.effectAllowed='move';}
function f3allow(e){e.preventDefault();e.currentTarget.classList.add('drag-over');}
function f3leave(e){e.currentTarget.classList.remove('drag-over');}
function f3drop(e){
  e.preventDefault();e.currentTarget.classList.remove('drag-over');
  var zone=e.currentTarget;if(!f3dragged)return;
  var existing=zone.querySelector('.f3-placed');
  if(existing){var oi=existing.dataset.fidx;var orig=document.querySelector('#f3pool .f3-drag[data-fidx="'+oi+'"]');if(orig)orig.classList.remove('used');existing.remove();}
  var placed=document.createElement('div');placed.className='f3-placed';placed.dataset.fidx=f3dragged.dataset.fidx;placed.textContent=f3dragged.textContent;
  var rb=document.createElement('button');rb.className='f3-rm';rb.textContent='×';
  rb.onclick=function(){var oi=placed.dataset.fidx;var orig=document.querySelector('#f3pool .f3-drag[data-fidx="'+oi+'"]');if(orig)orig.classList.remove('used');placed.remove();};
  placed.appendChild(rb);zone.appendChild(placed);f3dragged.classList.add('used');f3dragged=null;
}
function checkFill3(){
  var q=QS[curQ];var ok=true;
  for(var i=0;i<q.answers.length;i++){
    var zone=document.getElementById('f3z'+i);
    var placed=zone.querySelector('.f3-placed');
    if(!placed){ok=false;zone.classList.add('f3-wrong');continue;}
    if(placed.textContent.replace('×','').trim().toLowerCase()===q.answers[i].toLowerCase())zone.classList.add('f3-correct');
    else{zone.classList.add('f3-wrong');ok=false;}
  }
  document.querySelectorAll('.f3-drag').forEach(d=>d.draggable=false);
  document.querySelector('button[onclick="checkFill3()"]').disabled=true;
  if(ok){score+=10;document.getElementById('scorebadge').textContent=score;showFB(true);}else{wrong++;showFB(false);}
}
function showFB(ok){
  var q=QS[curQ];var fb=document.getElementById('fb');
  fb.className='fb show '+(ok?'ok':'no');
  fb.innerHTML=(ok?'✓ Chính xác! ':'✗ Chưa đúng. ')+(q.fb||'');
  document.getElementById('btnnext').classList.add('show');
  if(ok)playCorrect();else playWrong();
}
function nextQ(){playClick();curQ++;showQ();}
function showResult(){
  document.getElementById('quiz').classList.remove('active');
  document.getElementById('result').classList.add('active');
  document.getElementById('rscore').textContent=score;
  var title,stars,crown;
  if(score>=270){title='Trạng Nguyên';stars='⭐⭐⭐';crown='👑';}
  else if(score>=240){title='Bảng Nhãn';stars='⭐⭐';crown='🥈';}
  else if(score>=210){title='Thám Hoa';stars='⭐';crown='🥉';}
  else{title='Cố gắng lần sau!';stars='';crown='📚';}
  document.getElementById('rtitle').textContent=title;
  document.getElementById('rstars').textContent=stars;
  document.getElementById('rcrown').textContent=crown;
  document.getElementById('rwrong').textContent=wrong>0?'Sai '+wrong+' câu':'Hoàn hảo! 🎉';
  if(score>=240){confetti();playFinish();}
}
function confetti(){
  var c=document.getElementById('cfcontainer');
  var colors=['#E53935','#FFB300','#42A5F5','#43A047','#AB47BC'];
  for(var i=0;i<100;i++){
    var cf=document.createElement('div');cf.className='cf';
    cf.style.left=Math.random()*100+'%';
    cf.style.background=colors[Math.floor(Math.random()*colors.length)];
    cf.style.animationDuration=(2+Math.random()*2)+'s';
    cf.style.animationDelay=Math.random()*0.5+'s';
    c.appendChild(cf);setTimeout(()=>cf.remove(),5000);
  }
}
function restartQuiz(){
  document.getElementById('result').classList.remove('active');
  document.getElementById('start').classList.add('active');
  document.getElementById('cfcontainer').innerHTML='';
}
</script>
