<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn luyện kỳ thi Trạng Nguyên Tiếng Việt Lớp 2</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            margin: 0;
            padding: 0;
        }
        h1 {
            text-align: center;
            color: #333;
            font-size: 2.5em;
            margin-top: 20px;
        }
        .quiz-card {
            cursor: pointer;
            border: 2px solid #007bff;
            border-radius: 8px;
            padding: 20px;
            margin: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .quiz-card:hover {
            background-color: #e7f0ff;
        }
    </style>
</head>
<body>
    <h1>Ôn luyện kỳ thi Trạng Nguyên Tiếng Việt Lớp 2</h1>
    <div class="quiz-card">Quiz 1</div>
    <div class="quiz-card">Quiz 2</div>
    <div class="quiz-card">Quiz 3</div>
</body>
</html>
