<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ôn luyện thi Trạng Nguyên Tiếng Việt</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Playfair+Display:wght@700&display=swap');
    body { font-family: 'Roboto', sans-serif; }
    h1 { font-family: 'Playfair Display', sans-serif; }
  </style>
</head>
<body class="bg-[#f5e8c7] min-h-screen flex items-center justify-center p-4">
  <div class="bg-white rounded-3xl shadow-2xl max-w-5xl w-full overflow-hidden">
    <div class="pt-10 pb-6 text-center">
      <img src="trangnguyen.png" alt="Trạng Nguyên" class="mx-auto w-40 h-40 object-contain drop-shadow-lg">
      <h1 class="text-5xl font-bold text-red-600 mt-6 tracking-wide">Ôn luyện thi Trạng Nguyên Tiếng Việt</h1>
    </div>

    <div class="px-8 pb-4">
      <div id="de-list" class="grid grid-cols-3 sm:grid-cols-6 gap-4"></div>
    </div>

    <div class="px-8 pb-12">
      <button id="ontap-btn" class="w-full rounded-2xl p-5 sm:p-6 bg-gradient-to-r from-rose-500 via-orange-500 to-amber-500 text-white shadow-xl hover:scale-[1.01] hover:shadow-2xl transition-all duration-300 border-2 border-amber-200/60">
        <div class="text-2xl sm:text-3xl font-extrabold tracking-wide">220 Câu Ôn tập</div>
        <div class="text-sm sm:text-base font-semibold opacity-95 mt-1">Bộ câu hỏi tổng hợp • Luyện lại câu sai thông minh</div>
      </button>
    </div>

    <div class="text-center py-6 border-t text-gray-400 text-sm">Lớp 2 • Chúc bạn đạt Trạng Nguyên! 👑</div>
  </div>

  <audio id="magic" src="magic-twinkle.mp3" preload="auto"></audio>

  <button
    id="reset-scores"
    class="fixed right-4 bottom-4 sm:right-6 sm:bottom-6 z-50 bg-red-600 hover:bg-red-700 text-white font-bold text-sm sm:text-base px-4 py-3 rounded-full shadow-xl transition-all duration-200 hover:scale-105"
    type="button"
    title="Xóa toàn bộ điểm cao nhất"
  >
    Reset điểm
  </button>

  <script>
    const magicSound = document.getElementById('magic');
    const scoreLabels = {};

    function getHighScore(deNumber) {
      const key = `tn_lop2_de_${deNumber}_highscore`;
      const raw = localStorage.getItem(key);
      const score = parseInt(raw || '0', 10);
      return Number.isNaN(score) ? 0 : score;
    }

    function updateHighScoreLabel(deNumber) {
      const label = scoreLabels[deNumber];
      if (!label) return;
      const score = getHighScore(deNumber);
      label.textContent = score > 0 ? `Điểm cao nhất: ${score}/300` : 'Chưa có điểm';
    }

    function playMagicTwinkle() {
      magicSound.currentTime = 0;
      magicSound.volume = 0.8;
      magicSound.play().catch(() => {});
    }

    function resetAllHighScores() {
      const ok = window.confirm('Bạn có chắc muốn reset toàn bộ điểm cao nhất (18 đề)?');
      if (!ok) return;
      for (let i = 1; i <= 18; i++) {
        localStorage.removeItem(`tn_lop2_de_${i}_highscore`);
        updateHighScoreLabel(i);
      }
    }

    function initTailwind() {
      const colors = [
        'bg-red-400 hover:bg-red-500', 'bg-orange-400 hover:bg-orange-500',
        'bg-amber-400 hover:bg-amber-500', 'bg-yellow-400 hover:bg-yellow-500',
        'bg-lime-400 hover:bg-lime-500', 'bg-emerald-400 hover:bg-emerald-500',
        'bg-cyan-400 hover:bg-cyan-500', 'bg-sky-400 hover:bg-sky-500',
        'bg-blue-400 hover:bg-blue-500', 'bg-indigo-400 hover:bg-indigo-500',
        'bg-violet-400 hover:bg-violet-500', 'bg-purple-400 hover:bg-purple-500',
        'bg-fuchsia-400 hover:bg-fuchsia-500', 'bg-pink-400 hover:bg-pink-500',
        'bg-rose-400 hover:bg-rose-500', 'bg-red-500 hover:bg-red-600',
        'bg-orange-500 hover:bg-orange-600', 'bg-amber-500 hover:bg-amber-600'
      ];

      const container = document.getElementById('de-list');
      for (let i = 1; i <= 18; i++) {
        const wrap = document.createElement('div');
        wrap.className = 'flex flex-col gap-2';

        const btn = document.createElement('button');
        btn.className = `${colors[i - 1]} text-white font-bold text-lg py-6 rounded-2xl shadow-md transition-all duration-300 hover:scale-110 hover:shadow-2xl flex items-center justify-center`;
        btn.textContent = `ĐỀ SỐ ${i}`;
        btn.onclick = () => {
          playMagicTwinkle();
          window.open(`${i}.html`, '_blank');
        };

        const scoreText = document.createElement('div');
        scoreText.className = 'text-center text-xs font-semibold text-gray-600';
        scoreLabels[i] = scoreText;
        updateHighScoreLabel(i);

        wrap.appendChild(btn);
        wrap.appendChild(scoreText);
        container.appendChild(wrap);
      }

      document.getElementById('ontap-btn').addEventListener('click', () => {
        playMagicTwinkle();
        window.location.href = 'ontap.html';
      });

      document.getElementById('reset-scores').addEventListener('click', resetAllHighScores);
    }

    window.addEventListener('storage', () => {
      for (let i = 1; i <= 18; i++) updateHighScoreLabel(i);
    });

    window.addEventListener('DOMContentLoaded', initTailwind);
  </script>
</body>
</html>
