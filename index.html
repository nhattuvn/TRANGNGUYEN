<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn luyện thi Trạng Nguyên Tiếng Việt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Playfair+Display:wght@700&display=swap');
        body { font-family: 'Roboto', sans-serif; }
        h1 { font-family: 'Playfair Display', sans-serif; }
    </style>
</head>
<body class="bg-[#f5e8c7] min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl shadow-2xl max-w-5xl w-full overflow-hidden">
        
        <!-- Header -->
        <div class="pt-10 pb-6 text-center">
            <img src="trangnguyen.png" alt="Trạng Nguyên" 
                 class="mx-auto w-40 h-40 object-contain drop-shadow-lg">
            <h1 class="text-5xl font-bold text-red-600 mt-6 tracking-wide">
                Ôn luyện thi Trạng Nguyên Tiếng Việt
            </h1>
        </div>

        <!-- 18 Badge -->
        <div class="px-8 pb-12">
            <div id="de-list" 
                 class="grid grid-cols-3 sm:grid-cols-6 gap-4">
                <!-- JS sẽ tự sinh 18 badge -->
            </div>
        </div>

        <!-- Footer nhỏ -->
        <div class="text-center py-6 border-t text-gray-400 text-sm">
            Lớp 2 • Chúc bạn đạt Trạng Nguyên! 👑
        </div>
    </div>

    <script>
        // Tailwind script
        function initTailwind() {
            // Mảng màu rainbow pastel
            const colors = [
                "bg-red-400 hover:bg-red-500", "bg-orange-400 hover:bg-orange-500",
                "bg-amber-400 hover:bg-amber-500", "bg-yellow-400 hover:bg-yellow-500",
                "bg-lime-400 hover:bg-lime-500", "bg-emerald-400 hover:bg-emerald-500",
                "bg-cyan-400 hover:bg-cyan-500", "bg-sky-400 hover:bg-sky-500",
                "bg-blue-400 hover:bg-blue-500", "bg-indigo-400 hover:bg-indigo-500",
                "bg-violet-400 hover:bg-violet-500", "bg-purple-400 hover:bg-purple-500",
                "bg-fuchsia-400 hover:bg-fuchsia-500", "bg-pink-400 hover:bg-pink-500",
                "bg-rose-400 hover:bg-rose-500", "bg-red-500 hover:bg-red-600",
                "bg-orange-500 hover:bg-orange-600", "bg-amber-500 hover:bg-amber-600"
            ];

            const container = document.getElementById('de-list');
            
            for (let i = 1; i <= 18; i++) {
                const btn = document.createElement('button');
                btn.className = `
                    ${colors[i-1]} text-white font-bold text-lg py-6 rounded-2xl 
                    shadow-md transition-all duration-300 hover:scale-110 hover:shadow-2xl
                    flex items-center justify-center
                `;
                btn.textContent = `ĐỀ SỐ ${i}`;
                btn.onclick = () => window.open(`${i}.html`, '_blank');
                container.appendChild(btn);
            }
        }

        // Chạy khi load
        window.onload = initTailwind;
    </script>
</body>
</html>
