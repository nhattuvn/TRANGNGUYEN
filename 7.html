<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trạng Nguyên Tiếng Việt Lớp 2 – Đề 7</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#FFF9C4 0%,#FFE0B2 50%,#E3F2FD 100%);min-height:100vh}
.screen{display:none;min-height:100vh;padding:16px}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center}
/* START */
.start-card{background:#fff;border-radius:24px;padding:32px 24px;max-width:480px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.12);text-align:center}
.crown{font-size:64px;margin-bottom:8px;animation:bounce 1s infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-10px)}}
.title{font-size:22px;font-weight:800;color:#E53935;margin-bottom:4px}
.subtitle{font-size:15px;color:#1565C0;font-weight:600;margin-bottom:20px}
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:24px}
.chip{background:#E3F2FD;color:#1565C0;border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600}
.chip.g{background:#E8F5E9;color:#43A047}
.chip.y{background:#FFF9C4;color:#F57F17}
.btn-start{background:linear-gradient(135deg,#E53935,#FFB300);color:#fff;border:none;border-radius:16px;padding:14px 40px;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(229,57,53,.35);transition:transform .15s}
.btn-start:hover{transform:scale(1.04)}
/* QUIZ */
#quiz{padding:12px;justify-content:flex-start;padding-top:16px}
.quiz-wrap{max-width:560px;width:100%}
.top-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.q-num{font-size:13px;font-weight:700;color:#1565C0;white-space:nowrap}
.prog-bar{flex:1;height:10px;background:#E3F2FD;border-radius:5px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#42A5F5,#1565C0);border-radius:5px;transition:width .4s}
.score-badge{background:#FFB300;color:#fff;border-radius:12px;padding:3px 10px;font-size:13px;font-weight:700;white-space:nowrap}
.q-card{background:#fff;border-radius:20px;padding:20px;box-shadow:0 4px 16px rgba(0,0,0,.08);margin-bottom:12px}
.ctx-box{background:#FFF9C4;border-left:4px solid #FFB300;border-radius:8px;padding:12px;margin-bottom:14px;font-size:14px;color:#263238;line-height:1.6;white-space:pre-wrap}
.q-text{font-size:16px;font-weight:700;color:#263238;margin-bottom:16px;line-height:1.5}
/* MCQ */
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt{background:#F5F5F5;border:2px solid #E0E0E0;border-radius:12px;padding:12px;cursor:pointer;display:flex;align-items:flex-start;gap:10px;transition:all .15s;font-size:14px;color:#263238;text-align:left;line-height:1.4}
.opt:hover{border-color:#42A5F5;background:#E3F2FD}
.opt.correct{background:#E8F5E9!important;border-color:#43A047!important;color:#1B5E20!important}
.opt.wrong{background:#FFEBEE!important;border-color:#E53935!important;color:#B71C1C!important}
.opt.disabled{cursor:default;pointer-events:none}
.opt-lbl{background:#42A5F5;color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.opt.correct .opt-lbl{background:#43A047}
.opt.wrong .opt-lbl{background:#E53935}
/* FILL / TYPE */
.pills{display:flex;flex-wrap:wrap;gap:10px}
.pill{background:#E3F2FD;border:2px solid #42A5F5;border-radius:20px;padding:8px 20px;cursor:pointer;font-size:15px;font-weight:600;color:#1565C0;transition:all .15s}
.pill:hover{background:#42A5F5;color:#fff}
.pill.correct{background:#E8F5E9;border-color:#43A047;color:#1B5E20}
.pill.wrong{background:#FFEBEE;border-color:#E53935;color:#B71C1C}
.pill.disabled{cursor:default;pointer-events:none}
/* TYPE */
.type-row{display:flex;gap:8px;align-items:center}
.type-input{flex:1;border:2px solid #E0E0E0;border-radius:10px;padding:10px 14px;font-size:15px;font-family:inherit;outline:none;transition:border .15s}
.type-input:focus{border-color:#42A5F5}
.type-input.correct{border-color:#43A047;background:#E8F5E9}
.type-input.wrong{border-color:#E53935;background:#FFEBEE}
.btn-check{background:#42A5F5;color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:15px;cursor:pointer;white-space:nowrap;font-weight:600}
.btn-check:disabled{background:#bbb;cursor:default}
/* MATCH */
.match-wrap{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.col-title{font-size:12px;font-weight:700;color:#1565C0;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.match-left-item{background:#F5F5F5;border:2px dashed #90CAF9;border-radius:10px;padding:10px;margin-bottom:8px}
.match-left-label{font-size:13px;font-weight:600;color:#263238;margin-bottom:6px;line-height:1.4}
.drop-zone{border:2px dashed #bbb;border-radius:8px;min-height:36px;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:12px;transition:all .15s;padding:4px;position:relative}
.drop-zone.has-item{border-color:#42A5F5;background:#E3F2FD}
.drop-zone.drag-over{border-color:#FFB300;background:#FFF9C4}
.drop-zone.match-correct{border-color:#43A047!important;background:#E8F5E9!important}
.drop-zone.match-wrong{border-color:#E53935!important;background:#FFEBEE!important}
.match-right-pool{display:flex;flex-direction:column;gap:8px}
.drag-item{background:#1565C0;color:#fff;border-radius:8px;padding:8px 10px;cursor:grab;font-size:13px;font-weight:600;user-select:none;text-align:center;line-height:1.3;position:relative}
.drag-item:active{cursor:grabbing}
.rm-btn{position:absolute;top:-7px;right:-7px;background:#E53935;color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;padding:0;z-index:2}
.btn-match-check{background:#43A047;color:#fff;border:none;border-radius:12px;padding:10px 24px;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px;width:100%}
/* SORT */
.sort-wrap{display:flex;flex-direction:column;gap:6px}
.sort-item{background:#E3F2FD;border:2px solid #90CAF9;border-radius:10px;padding:10px 14px;cursor:grab;font-size:14px;color:#263238;display:flex;align-items:center;gap:8px;user-select:none}
.sort-item:active{cursor:grabbing;background:#BBDEFB}
.sort-item.dragging-active{opacity:.4}
.sort-handle{color:#90CAF9;font-size:18px;flex-shrink:0}
.btn-sort-check{background:#43A047;color:#fff;border:none;border-radius:12px;padding:10px 24px;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px;width:100%}
/* CLASSIFY */
.classify-pool{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;min-height:44px;border:2px dashed #E0E0E0;border-radius:10px;padding:8px}
.classify-buckets{display:grid;gap:10px}
.bucket{border:2px dashed #90CAF9;border-radius:10px;padding:10px}
.bucket-title{font-size:12px;font-weight:700;color:#1565C0;margin-bottom:8px;text-transform:uppercase}
.bucket-drop{min-height:40px;display:flex;flex-wrap:wrap;gap:6px;align-items:flex-start}
.bucket-drop.drag-over{background:#FFF9C4}
.cls-item{background:#1565C0;color:#fff;border-radius:8px;padding:6px 12px;cursor:grab;font-size:13px;font-weight:600;user-select:none;position:relative}
.cls-item:active{cursor:grabbing}
.cls-item .rm-btn{display:none}
.cls-item.in-bucket .rm-btn{display:flex}
.btn-cls-check{background:#43A047;color:#fff;border:none;border-radius:12px;padding:10px 24px;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px;width:100%}
/* FEEDBACK */
.fb{border-radius:10px;padding:10px 14px;font-size:13px;margin-top:12px;line-height:1.5;display:none}
.fb.show{display:block}
.fb.ok{background:#E8F5E9;color:#1B5E20;border-left:4px solid #43A047}
.fb.no{background:#FFEBEE;color:#B71C1C;border-left:4px solid #E53935}
.btn-next{background:linear-gradient(135deg,#1565C0,#42A5F5);color:#fff;border:none;border-radius:12px;padding:12px 32px;font-size:16px;font-weight:700;cursor:pointer;margin-top:10px;width:100%;display:none}
.btn-next.show{display:block}
/* RESULT */
.result-card{background:#fff;border-radius:24px;padding:32px 24px;max-width:440px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.12);text-align:center}
.result-crown{font-size:72px;margin-bottom:8px}
.result-score{font-size:48px;font-weight:800;color:#E53935;margin-bottom:4px}
.result-total{font-size:16px;color:#888;margin-bottom:12px}
.result-title{font-size:24px;font-weight:700;color:#263238;margin-bottom:8px}
.result-stars{font-size:32px;margin-bottom:20px}
.result-wrong{font-size:14px;color:#888;margin-bottom:20px}
.btn-retry{background:linear-gradient(135deg,#E53935,#FFB300);color:#fff;border:none;border-radius:16px;padding:14px 40px;font-size:17px;font-weight:700;cursor:pointer}
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;overflow:hidden}
.cf{position:absolute;width:10px;height:10px;border-radius:2px;animation:fall linear forwards}
@keyframes fall{0%{opacity:1;transform:translateY(-10px) rotate(0deg)}100%{opacity:0;transform:translateY(110vh) rotate(720deg)}}
@media(max-width:400px){.opts{grid-template-columns:1fr}.match-wrap{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="start" class="screen active">
  <div class="start-card">
    <div class="crown">👑</div>
    <div class="title">Trạng Nguyên Tiếng Việt</div>
    <div class="subtitle">Lớp 2 – Đề 7</div>
    <div class="chips">
      <span class="chip">30 câu hỏi</span>
      <span class="chip g">300 điểm</span>
      <span class="chip y">Nhiều dạng bài</span>
    </div>
    <button class="btn-start" onclick="startQuiz()">🚀 Bắt đầu thi!</button>
  </div>
</div>

<div id="quiz" class="screen">
  <div class="quiz-wrap">
    <div class="top-bar">
      <span class="q-num" id="qnum">Câu 1/30</span>
      <div class="prog-bar"><div class="prog-fill" id="prog" style="width:0%"></div></div>
      <span class="score-badge" id="scorebadge">0đ</span>
    </div>
    <div class="q-card" id="qcard"></div>
    <button class="btn-next" id="btnnext" onclick="nextQ()">Câu tiếp theo ➡️</button>
  </div>
</div>

<div id="result" class="screen">
  <div class="confetti-container" id="cfcontainer"></div>
  <div class="result-card">
    <div class="result-crown" id="rcrown">👑</div>
    <div class="result-score" id="rscore">0</div>
    <div class="result-total">/ 300 điểm</div>
    <div class="result-title" id="rtitle">Trạng Nguyên</div>
    <div class="result-stars" id="rstars">⭐⭐⭐</div>
    <div class="result-wrong" id="rwrong"></div>
    <button class="btn-retry" onclick="restartQuiz()">🔄 Thi lại</button>
  </div>
</div>

<script>
/* Global stubs so onclick attrs never throw ReferenceError */
function startQuiz(){if(window._quizReady)window._startQuiz();}
function nextQ(){if(window._quizReady)window._nextQ();}
function restartQuiz(){if(window._quizReady)window._restartQuiz();}

  function playOK(){tone(523,.1,'sine',.3);setTimeout(function(){tone(659,.1,'sine',.3);},100);setTimeout(function(){tone(784,.1,'sine',.3);},200);setTimeout(function(){tone(1047,.3,'sine',.3);},300);}
  function playNo(){tone(247,.2,'sawtooth',.3);setTimeout(function(){tone(208,.3,'sawtooth',.3);},200);}
  function playFanfare(){[523,659,784,1047,1319].forEach(function(f,i){setTimeout(function(){tone(f,.2,'triangle',.4);},i*120);});}

  /* CONFETTI */
  var COLORS=['#E53935','#FFB300','#43A047','#1565C0','#42A5F5','#FF7043','#AB47BC'];
  function mkDot(big){var c=document.getElementById('cfcontainer');if(!c)return;var d=document.createElement('div');d.className='cf';d.style.cssText='left:'+Math.random()*100+'%;background:'+COLORS[Math.floor(Math.random()*COLORS.length)]+';animation-duration:'+(big?1.5+Math.random()*2:0.8+Math.random()*0.8)+'s;animation-delay:'+Math.random()*0.3+'s;width:'+(big?6+Math.random()*10:8+Math.random()*8)+'px;height:'+(big?6+Math.random()*10:8+Math.random()*8)+'px;border-radius:'+Math.random()*50+'%';c.appendChild(d);setTimeout(function(){try{c.removeChild(d);}catch(e){}},big?5000:2000);}
  function burst(){for(var i=0;i<18;i++)mkDot(false);}
  function confetti(){for(var i=0;i<80;i++)(function(i){setTimeout(function(){mkDot(true);},i*60);})(i);}

  /* SCREENS */
  function showScreen(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});document.getElementById(id).classList.add('active');}

  /* FEEDBACK */
  function showFb(ok,msg){var fb=document.getElementById('fb');fb.className='fb show '+(ok?'ok':'no');fb.textContent=(ok?'✅ Đúng rồi! ':'❌ Chưa đúng! ')+msg;document.getElementById('btnnext').className='btn-next show';}

  /* LOAD */
  function loadQ(){
    var q=QUESTIONS[curQ];
    document.getElementById('qnum').textContent='Câu '+(curQ+1)+'/30';
    document.getElementById('prog').style.width=((curQ/30)*100)+'%';
    document.getElementById('scorebadge').textContent=score+'đ';
    document.getElementById('btnnext').className='btn-next';
    var h='';
    if(q.ctx)h+='<div class="ctx-box">'+q.ctx.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\n/g,'<br>')+'</div>';
    if(q.ci)h+='<img class="ctx-img" src="'+IMG[q.ci]+'" alt="" style="max-width:100%;border-radius:10px;margin-bottom:10px">';
    h+='<div class="q-text">'+q.q+'</div>';
    if(q.t==='mcq')h+=buildMCQ(q);
    else if(q.t==='fill')h+=buildFill(q);
    else if(q.t==='fill2')h+=buildFill2(q);
    else if(q.t==='type')h+=buildType();
    else if(q.t==='match')h+=buildMatch(q);
    else if(q.t==='sort')h+=buildSort(q);
    else if(q.t==='classify')h+=buildClassify(q);
    h+='<div class="fb" id="fb"></div>';
    document.getElementById('qcard').innerHTML=h;
    if(q.t==='match')initMatch(q);
    if(q.t==='sort')initSort(q);
    if(q.t==='classify')initClassify(q);
    if(q.t==='fill2')initFill2(q);
    if(q.t==='type'){document.getElementById('typeinput').addEventListener('keydown',function(e){if(e.key==='Enter')doCheckType();});}
  }

  /* MCQ */
  function buildMCQ(q){
    var h='<div class="opts">';
    q.o.forEach(function(o,i){h+='<div class="opt" id="opt'+i+'" onclick="window.pickMCQ('+i+')"><span class="opt-lbl">'+'ABCD'[i]+'</span>'+o.replace(/^[A-D]\. /,'')+'</div>';});
    return h+'</div>';
  }
  window.pickMCQ=function(i){
    var q=QUESTIONS[curQ];
    document.querySelectorAll('.opt').forEach(function(o){o.classList.add('disabled');});
    var ok=(i===q.a);
    document.getElementById('opt'+i).classList.add(ok?'correct':'wrong');
    if(!ok){document.getElementById('opt'+q.a).classList.add('correct');wrongs++;playNo();}
    else{burst();playOK();score+=10;}
    showFb(ok,q.fb);
    document.getElementById('scorebadge').textContent=score+'đ';
  };

  /* FILL */
  function buildFill(q){
    var h='<div class="pills">';
    q.opts.forEach(function(o){h+='<div class="pill" data-val="'+o+'" onclick="window.pickFill(this)">'+o+'</div>';});
    return h+'</div>';
  }
  window.pickFill=function(el){
    var q=QUESTIONS[curQ];
    var val=el.dataset.val;
    document.querySelectorAll('.pill').forEach(function(p){p.classList.add('disabled');});
    var ok=(val===q.a);
    el.classList.add(ok?'correct':'wrong');
    if(!ok){document.querySelectorAll('.pill').forEach(function(p){if(p.dataset.val===q.a)p.classList.add('correct');});wrongs++;playNo();}
    else{burst();playOK();score+=10;}
    showFb(ok,q.fb);
    document.getElementById('scorebadge').textContent=score+'đ';
  };

  /* TYPE */
  function buildType(){return '<div class="type-row"><input class="type-input" id="typeinput" placeholder="Nhập câu trả lời..." autocomplete="off"><button class="btn-check" onclick="window.doCheckType()">Kiểm tra</button></div>';}
  window.doCheckType=function(){
    var q=QUESTIONS[curQ];
    var inp=document.getElementById('typeinput');
    if(!inp||inp.disabled)return;
    var val=inp.value.trim().toLowerCase();
    if(!val||(q.min&&val.length<q.min)){inp.focus();return;}
    var ans=(q.a+'').toLowerCase();
    // remove diacritics helper
    function nd(s){return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/đ/g,'d').replace(/Đ/g,'d');}
    var alts=q.alts||[];
    var ok=(val===ans||ans.includes(val)||val.includes(ans)||alts.some(function(a){return nd(val)===nd(a)||val===nd(a);})||nd(val)===nd(ans));
    inp.disabled=true;
    document.querySelector('.btn-check').disabled=true;
    inp.classList.add(ok?'correct':'wrong');
    if(!ok){wrongs++;playNo();}else{burst();playOK();score+=10;}
    showFb(ok,q.fb);
    document.getElementById('scorebadge').textContent=score+'đ';
  };


  /* FILL2 - two separate blanks each with their own pill set */
  function buildFill2(q){
    var h='';
    q.blanks.forEach(function(b,bi){
      h+='<div style="margin-bottom:12px"><div style="font-size:13px;color:#555;margin-bottom:6px">'+b.label+'</div>';
      h+='<div class="pills" id="pills2_'+bi+'">';
      b.opts.forEach(function(o){h+='<div class="pill" data-val="'+o+'" data-bi="'+bi+'" onclick="window.pickFill2(this)">'+o+'</div>';});
      h+='</div></div>';
    });
    return h;
  }
  function initFill2(q){window._fill2state={ans:new Array(q.blanks.length).fill(null),total:q.blanks.length};}
  window.pickFill2=function(el){
    var q=QUESTIONS[curQ];
    var bi=parseInt(el.dataset.bi);
    var val=el.dataset.val;
    var container=document.getElementById('pills2_'+bi);
    // disable this group
    container.querySelectorAll('.pill').forEach(function(p){p.classList.add('disabled');});
    var ok=(val===q.blanks[bi].a);
    el.classList.add(ok?'correct':'wrong');
    if(!ok)container.querySelectorAll('.pill').forEach(function(p){if(p.dataset.val===q.blanks[bi].a)p.classList.add('correct');});
    window._fill2state.ans[bi]=ok;
    var allAnswered=window._fill2state.ans.every(function(v){return v!==null;});
    if(allAnswered){
      var allOk=window._fill2state.ans.every(function(v){return v===true;});
      if(allOk){burst();playOK();score+=10;}else{wrongs++;playNo();}
      showFb(allOk,q.fb);
      document.getElementById('scorebadge').textContent=score+'đ';
    }
  };

  /* MATCH */
  function buildMatch(q){
    return '<div class="match-wrap"><div><div class="col-title">Cột A</div><div id="mleft"></div></div><div><div class="col-title">Cột B</div><div class="match-right-pool" id="pool"></div></div></div><button class="btn-match-check" id="btnmatch" style="display:none" onclick="window.doCheckMatch()">✅ Kiểm tra</button>';
  }
  function initMatch(q){
    var leftDiv=document.getElementById('mleft');
    var h='';
    q.left.forEach(function(l,i){h+='<div class="match-left-item"><div class="match-left-label">'+l+'</div><div class="drop-zone" id="dz'+i+'" data-idx="'+i+'">Kéo vào đây…</div></div>';});
    leftDiv.innerHTML=h;
    var pool=document.getElementById('pool');
    var order=q.right.map(function(_,i){return i;}).sort(function(){return Math.random()-.5;});
    order.forEach(function(ri){
      var r=q.right[ri];
      var el=document.createElement('div');el.className='drag-item';el.draggable=true;el.dataset.ri=ri;el.id='di'+ri;el.textContent=r.txt;
      el.addEventListener('dragstart',function(e){_dragEl=el;e.dataTransfer.effectAllowed='move';});
      el.addEventListener('dragend',function(){_dragEl=null;document.querySelectorAll('.drop-zone').forEach(function(z){z.classList.remove('drag-over');});});
      el.addEventListener('touchstart',onTouchStart,{passive:false});
      pool.appendChild(el);
    });
    q.left.forEach(function(_,i){
      var dz=document.getElementById('dz'+i);
      dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('drag-over');});
      dz.addEventListener('dragleave',function(){dz.classList.remove('drag-over');});
      dz.addEventListener('drop',function(e){e.preventDefault();doDrop(i);});
    });
    updateMatchBtn(q);
  }
  function doDrop(idx){
    if(!_dragEl)return;
    var dz=document.getElementById('dz'+idx);
    dz.classList.remove('drag-over');
    var old=dz.querySelector('.drag-item');if(old)returnToPool(old);
    var rm=_dragEl.querySelector('.rm-btn');if(rm)_dragEl.removeChild(rm);
    var rmBtn=document.createElement('button');rmBtn.className='rm-btn';rmBtn.innerHTML='✕';
    (function(el){rmBtn.onclick=function(e){e.stopPropagation();returnToPool(el);updateMatchBtn(QUESTIONS[curQ]);};}(_dragEl));
    _dragEl.appendChild(rmBtn);
    _dragEl.parentNode.removeChild(_dragEl);
    dz.innerHTML='';dz.appendChild(_dragEl);dz.classList.add('has-item');
    updateMatchBtn(QUESTIONS[curQ]);
  }
  function returnToPool(el){
    var rm=el.querySelector('.rm-btn');if(rm)el.removeChild(rm);
    var dz=el.closest('.drop-zone');
    if(dz){dz.innerHTML='Kéo vào đây…';dz.classList.remove('has-item','drag-over','match-correct','match-wrong');}
    document.getElementById('pool').appendChild(el);
  }
  function updateMatchBtn(q){
    var filled=document.querySelectorAll('.drop-zone.has-item').length;
    var btn=document.getElementById('btnmatch');
    if(btn)btn.style.display=(filled===q.left.length?'block':'none');
  }
  window.doCheckMatch=function(){
    var q=QUESTIONS[curQ];var allOk=true;
    q.left.forEach(function(_,li){
      var dz=document.getElementById('dz'+li);var item=dz.querySelector('.drag-item');
      if(!item){allOk=false;return;}
      var ok=(q.ans[li]===parseInt(item.dataset.ri));
      if(!ok)allOk=false;
      dz.classList.add(ok?'match-correct':'match-wrong');
      item.style.pointerEvents='none';
      var rm=item.querySelector('.rm-btn');if(rm)rm.style.display='none';
    });
    document.getElementById('btnmatch').style.display='none';
    if(allOk){burst();playOK();score+=10;showFb(true,q.fb);}else{wrongs++;playNo();showFb(false,q.fb);}
    document.getElementById('scorebadge').textContent=score+'đ';
  };

  /* SORT */
  function buildSort(q){
    var h='<div class="sort-wrap" id="sortwrap">';
    var order=q.items.map(function(_,i){return i;}).sort(function(){return Math.random()-.5;});
    order.forEach(function(i){h+='<div class="sort-item" draggable="true" data-idx="'+i+'"><span class="sort-handle">⠿</span>'+q.items[i]+'</div>';});
    return h+'</div><button class="btn-sort-check" onclick="window.doCheckSort()">✅ Kiểm tra thứ tự</button>';
  }
  function initSort(){
    var wrap=document.getElementById('sortwrap');
    var dragging=null;
    wrap.querySelectorAll('.sort-item').forEach(function(el){
      el.addEventListener('dragstart',function(){dragging=el;el.classList.add('dragging-active');});
      el.addEventListener('dragend',function(){el.classList.remove('dragging-active');dragging=null;});
      el.addEventListener('dragover',function(e){e.preventDefault();if(!dragging||dragging===el)return;var r=el.getBoundingClientRect();var mid=r.top+r.height/2;if(e.clientY<mid)wrap.insertBefore(dragging,el);else wrap.insertBefore(dragging,el.nextSibling);});
    });
  }
  window.doCheckSort=function(){
    var q=QUESTIONS[curQ];
    var wrap=document.getElementById('sortwrap');
    var items=wrap.querySelectorAll('.sort-item');
    var order=[];items.forEach(function(el){order.push(parseInt(el.dataset.idx));});
    var ok=order.every(function(v,i){return v===q.ans[i];});
    items.forEach(function(el){el.style.cursor='default';el.setAttribute('draggable','false');});
    document.querySelector('.btn-sort-check').style.display='none';
    if(ok){burst();playOK();score+=10;showFb(true,q.fb);}else{wrongs++;playNo();showFb(false,q.fb);}
    document.getElementById('scorebadge').textContent=score+'đ';
  };

  /* CLASSIFY */
  function buildClassify(q){
    var h='<div style="font-size:12px;color:#888;margin-bottom:6px">Kéo các từ vào nhóm thích hợp:</div>';
    h+='<div class="classify-pool" id="clspool">';
    var order=q.items.map(function(_,i){return i;}).sort(function(){return Math.random()-.5;});
    order.forEach(function(i){h+='<div class="cls-item" draggable="true" data-idx="'+i+'">'+q.items[i]+'</div>';});
    h+='</div>';
    var cols=q.buckets.length===3?3:2;
    h+='<div class="classify-buckets" style="grid-template-columns:repeat('+cols+',1fr)">';
    q.buckets.forEach(function(b,bi){h+='<div class="bucket"><div class="bucket-title">'+b+'</div><div class="bucket-drop" id="bdrop'+bi+'" data-bucket="'+bi+'">'+' '+'</div></div>';});
    h+='</div>';
    h+='<button class="btn-cls-check" id="btnclscheck" style="display:none" onclick="window.doCheckCls()">✅ Kiểm tra</button>';
    return h;
  }
  function initClassify(q){
    var pool=document.getElementById('clspool');
    var dragItem=null;
    function bindDrag(el){
      el.addEventListener('dragstart',function(){dragItem=el;});
      el.addEventListener('dragend',function(){dragItem=null;document.querySelectorAll('.bucket-drop').forEach(function(d){d.classList.remove('drag-over');});});
      el.addEventListener('touchstart',function(e){if(e.touches.length!==1)return;e.preventDefault();dragItem=el;},{passive:false});
    }
    pool.querySelectorAll('.cls-item').forEach(bindDrag);
    function tryDrop(targetPool){
      if(!dragItem)return;
      var rm=dragItem.querySelector('.rm-btn');if(rm)dragItem.removeChild(rm);
      var oldBucket=dragItem.closest('.bucket-drop');
      if(oldBucket){oldBucket.removeChild(dragItem);}else{pool.removeChild(dragItem);}
      var rmBtn=document.createElement('button');rmBtn.className='rm-btn';rmBtn.style.display='flex';rmBtn.innerHTML='✕';
      (function(el,tp){rmBtn.onclick=function(e){e.stopPropagation();var r=el.querySelector('.rm-btn');if(r)el.removeChild(r);el.classList.remove('in-bucket');tp.removeChild(el);pool.appendChild(el);bindDrag(el);updateClsBtn(q);};}(dragItem,targetPool));
      dragItem.appendChild(rmBtn);
      dragItem.classList.add('in-bucket');
      targetPool.appendChild(dragItem);
      dragItem=null;
      updateClsBtn(q);
    }
    document.querySelectorAll('.bucket-drop').forEach(function(bd){
      bd.addEventListener('dragover',function(e){e.preventDefault();bd.classList.add('drag-over');});
      bd.addEventListener('dragleave',function(){bd.classList.remove('drag-over');});
      bd.addEventListener('drop',function(e){e.preventDefault();bd.classList.remove('drag-over');tryDrop(bd);});
      bd.addEventListener('touchend',function(e){
        var t=e.changedTouches[0];
        var under=document.elementFromPoint(t.clientX,t.clientY);
        var target=under&&(under.classList.contains('bucket-drop')?under:(under.closest?under.closest('.bucket-drop'):null));
        if(target)tryDrop(target);
        dragItem=null;
      });
    });
  }
  function updateClsBtn(q){
    var total=0;
    q.buckets.forEach(function(_,bi){total+=document.getElementById('bdrop'+bi).querySelectorAll('.cls-item').length;});
    var btn=document.getElementById('btnclscheck');
    if(btn)btn.style.display=(total>0?'block':'none');
  }
  window.doCheckCls=function(){
    var q=QUESTIONS[curQ];var allOk=true;
    q.buckets.forEach(function(_,bi){
      var bd=document.getElementById('bdrop'+bi);
      var placed=[];bd.querySelectorAll('.cls-item').forEach(function(el){placed.push(parseInt(el.dataset.idx));});
      var expected=q.ans[bi].slice().sort();
      var actual=placed.slice().sort();
      var ok=(JSON.stringify(expected)===JSON.stringify(actual));
      if(!ok)allOk=false;
      bd.style.background=ok?'#E8F5E9':'#FFEBEE';
      bd.style.border='2px solid '+(ok?'#43A047':'#E53935');
      bd.querySelectorAll('.cls-item').forEach(function(el){el.style.pointerEvents='none';var r=el.querySelector('.rm-btn');if(r)r.style.display='none';});
    });
    document.getElementById('btnclscheck').style.display='none';
    if(allOk){burst();playOK();score+=10;showFb(true,q.fb);}else{wrongs++;playNo();showFb(false,q.fb);}
    document.getElementById('scorebadge').textContent=score+'đ';
  };

  /* TOUCH DRAG (for match) */
  function onTouchStart(e){
    if(e.touches.length!==1)return;e.preventDefault();
    _touchEl=e.currentTarget;var t=e.touches[0];
    _touchClone=_touchEl.cloneNode(true);
    _touchClone.style.cssText='position:fixed;opacity:.85;pointer-events:none;z-index:9999;width:'+_touchEl.offsetWidth+'px;top:'+(t.clientY-30)+'px;left:'+(t.clientX-_touchEl.offsetWidth/2)+'px;';
    document.body.appendChild(_touchClone);
    document.addEventListener('touchmove',onTouchMove,{passive:false});
    document.addEventListener('touchend',onTouchEnd);
  }
  function onTouchMove(e){
    e.preventDefault();var t=e.touches[0];
    _touchClone.style.top=(t.clientY-30)+'px';_touchClone.style.left=(t.clientX-_touchClone.offsetWidth/2)+'px';
    document.querySelectorAll('.drop-zone').forEach(function(z){z.classList.remove('drag-over');});
    var under=document.elementFromPoint(t.clientX,t.clientY);
    var dz=under&&(under.classList.contains('drop-zone')?under:(under.closest?under.closest('.drop-zone'):null));
    if(dz)dz.classList.add('drag-over');
  }
  function onTouchEnd(e){
    document.removeEventListener('touchmove',onTouchMove);document.removeEventListener('touchend',onTouchEnd);
    if(_touchClone){document.body.removeChild(_touchClone);_touchClone=null;}
    var t=e.changedTouches[0];
    var under=document.elementFromPoint(t.clientX,t.clientY);
    var dz=under&&(under.classList.contains('drop-zone')?under:(under.closest?under.closest('.drop-zone'):null));
    if(dz){var idx=parseInt(dz.dataset.idx);_dragEl=_touchEl;doDrop(idx);}
    _touchEl=null;_dragEl=null;
    document.querySelectorAll('.drop-zone').forEach(function(z){z.classList.remove('drag-over');});
  }

  /* NAV */
  function _startQuiz(){curQ=0;score=0;wrongs=0;showScreen('quiz');loadQ();}
  function _nextQ(){curQ++;if(curQ>=QUESTIONS.length){showResult();return;}loadQ();}
  function _restartQuiz(){document.getElementById('cfcontainer').innerHTML='';showScreen('start');}
  window._startQuiz=_startQuiz;window._nextQ=_nextQ;window._restartQuiz=_restartQuiz;
  window.startQuiz=_startQuiz;window.nextQ=_nextQ;window.restartQuiz=_restartQuiz;
  window._quizReady=true;

  function showResult(){
    playFanfare();confetti();
    document.getElementById('rscore').textContent=score;
    var p=score/300,title,crown,stars;
    if(p===1){title='Trạng Nguyên';crown='👑';stars='⭐⭐⭐';}
    else if(p>=0.8){title='Xuất sắc';crown='🥇';stars='⭐⭐⭐';}
    else if(p>=0.6){title='Khá giỏi';crown='🥈';stars='⭐⭐';}
    else if(p>=0.4){title='Cố lên';crown='🥉';stars='⭐';}
    else{title='Ôn thêm nhé';crown='📚';stars='✨';}
    document.getElementById('rcrown').textContent=crown;
    document.getElementById('rtitle').textContent=title;
    document.getElementById('rstars').textContent=stars;
    document.getElementById('rwrong').textContent=wrongs>0?'Số câu sai: '+wrongs:'Tất cả đều đúng! 🎉';
    showScreen('result');
  }
})();
</script>
<script>
// tn-highscore-sync
(function() {
  const match = window.location.pathname.match(/(\d+)\.html$/);
  if (!match) return;

  const deNumber = parseInt(match[1], 10);
  const storageKey = `tn_lop2_de_${deNumber}_highscore`;
  const resultEl = document.getElementById('result');
  const pointsEl = document.getElementById('rpts');

  if (!resultEl || !pointsEl) return;

  function saveHighScore() {
    const scoreText = (pointsEl.textContent || '').replace(/[^\d]/g, '');
    const score = parseInt(scoreText, 10);
    if (Number.isNaN(score)) return;

    const prev = parseInt(localStorage.getItem(storageKey) || '0', 10);
    if (score > prev) {
      localStorage.setItem(storageKey, String(score));
    }
  }

  const pointObserver = new MutationObserver(saveHighScore);
  pointObserver.observe(pointsEl, { childList: true, characterData: true, subtree: true });

  const resultObserver = new MutationObserver(function() {
    if (window.getComputedStyle(resultEl).display !== 'none') {
      saveHighScore();
    }
  });
  resultObserver.observe(resultEl, { attributes: true, attributeFilter: ['style', 'class'] });

  window.addEventListener('beforeunload', saveHighScore);
})();
</script>
