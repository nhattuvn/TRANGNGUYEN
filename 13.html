<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trạng Nguyên Tiếng Việt Lớp 2 – Đề 13</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#FFF9C4 0%,#FFE0B2 50%,#E3F2FD 100%);min-height:100vh}
.screen{display:none;min-height:100vh;padding:16px}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center}
/* START */
.start-card{background:#fff;border-radius:24px;padding:32px 24px;max-width:480px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.12);text-align:center}
.crown{font-size:64px;margin-bottom:8px;animation:bounce 1s infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-10px)}}
.title{font-size:22px;font-weight:800;color:#E53935;margin-bottom:4px}
.subtitle{font-size:15px;color:#1565C0;font-weight:600;margin-bottom:20px}
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:24px}
.chip{background:#E3F2FD;color:#1565C0;border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600}
.chip.g{background:#E8F5E9;color:#43A047}
.chip.y{background:#FFF9C4;color:#F57F17}
.btn-start{background:linear-gradient(135deg,#E53935,#FFB300);color:#fff;border:none;border-radius:16px;padding:14px 40px;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(229,57,53,.35);transition:transform .15s}
.btn-start:hover{transform:scale(1.04)}
/* QUIZ */
#quiz{padding:12px;justify-content:flex-start;padding-top:16px}
.quiz-wrap{max-width:560px;width:100%}
.top-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.q-num{font-size:13px;font-weight:700;color:#1565C0;white-space:nowrap}
.prog-bar{flex:1;height:10px;background:#E3F2FD;border-radius:5px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#42A5F5,#1565C0);border-radius:5px;transition:width .4s}
.score-badge{background:#FFB300;color:#fff;border-radius:12px;padding:3px 10px;font-size:13px;font-weight:700;white-space:nowrap}
.q-card{background:#fff;border-radius:20px;padding:20px;box-shadow:0 4px 16px rgba(0,0,0,.08);margin-bottom:12px}
.img-container{width:100%;margin:14px 0;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.img-container img{width:100%;height:auto;display:block}
.ctx-box{background:#FFF9C4;border-left:4px solid #FFB300;border-radius:8px;padding:12px;margin-bottom:14px;font-size:14px;color:#263238;line-height:1.6;white-space:pre-wrap}
.q-text{font-size:16px;font-weight:700;color:#263238;margin-bottom:16px;line-height:1.5}
/* MCQ */
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt{background:#F5F5F5;border:2px solid #E0E0E0;border-radius:12px;padding:12px;cursor:pointer;display:flex;align-items:flex-start;gap:10px;transition:all .15s;font-size:14px;color:#263238;text-align:left;line-height:1.4}
.opt:hover{border-color:#42A5F5;background:#E3F2FD}
.opt.correct{background:#E8F5E9!important;border-color:#43A047!important;color:#1B5E20!important}
.opt.selected{background:#E3F2FD!important;border-color:#1565C0!important;font-weight:700}
.opt.wrong{background:#FFEBEE!important;border-color:#E53935!important;color:#B71C1C!important}
.opt.disabled{cursor:default;pointer-events:none}
.opt-lbl{background:#42A5F5;color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.opt.correct .opt-lbl{background:#43A047}
.opt.wrong .opt-lbl{background:#E53935}
.opt-img{width:100%;height:auto;border-radius:6px;margin-top:8px}
/* FILL / TYPE */
.pills{display:flex;flex-wrap:wrap;gap:10px}
.pill{background:#E3F2FD;border:2px solid #42A5F5;border-radius:20px;padding:8px 20px;cursor:pointer;font-size:15px;font-weight:600;color:#1565C0;transition:all .15s}
.pill:hover{background:#42A5F5;color:#fff}
.pill.correct{background:#E8F5E9;border-color:#43A047;color:#1B5E20}
.pill.wrong{background:#FFEBEE;border-color:#E53935;color:#B71C1C}
.pill.disabled{cursor:default;pointer-events:none;opacity:.5}
/* TYPE */
.type-row{display:flex;gap:8px;align-items:center}
.type-input{flex:1;border:2px solid #E0E0E0;border-radius:10px;padding:10px 14px;font-size:15px;font-family:inherit;outline:none;transition:border .15s}
.type-input:focus{border-color:#42A5F5}
.type-input.correct{border-color:#43A047;background:#E8F5E9}
.type-input.wrong{border-color:#E53935;background:#FFEBEE}
.btn-check{background:#42A5F5;color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:15px;cursor:pointer;white-space:nowrap;font-weight:600}
.btn-check:disabled{background:#bbb;cursor:default}
/* MATCH */
.match-wrap{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.col-title{font-size:12px;font-weight:700;color:#1565C0;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.match-left-item{background:#F5F5F5;border:2px solid #90CAF9;border-radius:10px;padding:10px;margin-bottom:8px;min-height:40px;display:flex;align-items:center;cursor:grab}
.match-left-label{font-size:13px;font-weight:600;color:#263238;line-height:1.4}
.drop-zone{border:2px solid #ccc;border-radius:8px;min-height:48px;display:flex;align-items:center;justify-content:center;color:#999;font-size:12px;transition:all .15s;padding:8px;position:relative;background:#f9f9f9;text-align:center;font-size:13px;font-weight:600;color:#333;min-height:60px}
.drop-zone.has-item{border-color:#42A5F5;background:#E3F2FD}
.drop-zone.drag-over{border-color:#FFB300;background:#FFF9C4;border-width:3px}
.drop-zone.match-correct{border-color:#43A047!important;background:#E8F5E9!important;border-width:2px}
.drop-zone.match-wrong{border-color:#E53935!important;background:#FFEBEE!important;border-width:2px}
.match-right-pool{display:flex;flex-direction:column;gap:8px}
.drag-item{background:#1565C0;color:#fff;border-radius:8px;padding:10px 12px;cursor:grab;font-size:13px;font-weight:600;user-select:none;text-align:center;line-height:1.4;position:relative;white-space:normal}
.drag-item:active{cursor:grabbing;opacity:.7}
.rm-btn{position:absolute;top:-7px;right:-7px;background:#E53935;color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;padding:0;z-index:2}
.btn-match-check{background:#43A047;color:#fff;border:none;border-radius:12px;padding:10px 24px;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px;width:100%}
/* CLASSIFY */
.classify-pool{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;min-height:44px;border:2px dashed #E0E0E0;border-radius:10px;padding:8px}
.classify-buckets{display:grid;gap:10px}
.bucket{border:2px solid #90CAF9;border-radius:10px;padding:10px;background:#FAFAFA}
.bucket-title{font-size:12px;font-weight:700;color:#1565C0;margin-bottom:8px;text-transform:uppercase;white-space:pre-wrap;line-height:1.4}
.bucket-drop{min-height:50px;display:flex;flex-wrap:wrap;gap:6px;align-items:flex-start;border:2px solid #ddd;border-radius:6px;padding:8px;background:#fff}
.bucket-drop.drag-over{background:#FFF9C4;border-color:#FFB300;border-width:3px}
.bucket-drop.match-correct{border-color:#43A047!important;background:#E8F5E9!important;border-width:2px}
.bucket-drop.match-wrong{border-color:#E53935!important;background:#FFEBEE!important;border-width:2px}
.cls-item{background:#1565C0;color:#fff;border-radius:8px;padding:6px 12px;cursor:grab;font-size:13px;font-weight:600;user-select:none;position:relative;white-space:nowrap}
.cls-item:active{cursor:grabbing;opacity:.7}
.cls-item .rm-btn{display:none}
.cls-item.in-bucket .rm-btn{display:flex}
.btn-cls-check{background:#43A047;color:#fff;border:none;border-radius:12px;padding:10px 24px;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px;width:100%}
/* SORT */
.sort-item{background:#E3F2FD;border:2px solid #90CAF9;border-radius:10px;padding:10px 14px;cursor:grab;font-size:14px;color:#263238;display:flex;align-items:center;gap:8px;user-select:none;margin-bottom:8px}
.sort-item:active{cursor:grabbing;background:#BBDEFB}
.sort-handle{color:#90CAF9;font-size:18px;flex-shrink:0}
.btn-sort-check{background:#43A047;color:#fff;border:none;border-radius:12px;padding:10px 24px;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px;width:100%}
/* FEEDBACK */
.fb{border-radius:10px;padding:10px 14px;font-size:13px;margin-top:12px;line-height:1.5;display:none}
.fb.show{display:block}
.fb.ok{background:#E8F5E9;color:#1B5E20;border-left:4px solid #43A047}
.fb.no{background:#FFEBEE;color:#B71C1C;border-left:4px solid #E53935}
.btn-next{background:linear-gradient(135deg,#1565C0,#42A5F5);color:#fff;border:none;border-radius:12px;padding:12px 32px;font-size:16px;font-weight:700;cursor:pointer;margin-top:10px;width:100%;display:none}
.btn-next.show{display:block}
/* FILL2 */
.fill2-item{background:#FFF9C4;border-left:3px solid #FFB300;border-radius:6px;padding:10px;margin:8px 0;font-size:13px;color:#263238}
.fill2-blanks{display:flex;flex-direction:column;gap:12px;margin-bottom:10px}
.poetry{white-space:pre-wrap;font-family:monospace;line-height:1.8;color:#263238;font-size:15px}
</style>
</head>
<body>

<div id="start" class="screen active">
  <div class="start-card">
    <div class="crown">👑</div>
    <div class="title">Trạng Nguyên Tiếng Việt Lớp 2</div>
    <div class="subtitle">Đề 13</div>
    <div class="chips">
      <div class="chip">📝 30 câu hỏi</div>
      <div class="chip g">✓ Kiến thức lớp 2</div>
      <div class="chip y">⭐ Luyện tập</div>
    </div>
    <button class="btn-start" onclick="startQuiz()">Bắt đầu</button>
  </div>
</div>

<div id="quiz" class="screen">
  <div class="quiz-wrap">
    <div class="top-bar">
      <div class="q-num" id="qnum"></div>
      <div class="prog-bar">
        <div class="prog-fill" id="progfill"></div>
      </div>
      <div class="score-badge" id="score">0đ</div>
    </div>
    <div class="q-card" id="qcard"></div>
    <button class="btn-next" id="btnnext" onclick="nextQ()">Tiếp tục →</button>
  </div>
</div>

// Tạo Web Audio API cho âm thanh
const audioContext = new (window.AudioContext || window.webkitAudioContext)();

function playSound(isCorrect) {
  const now = audioContext.currentTime;
  const osc = audioContext.createOscillator();
  const gain = audioContext.createGain();
  
  osc.connect(gain);
  gain.connect(audioContext.destination);
  
  if(isCorrect) {
    // Âm thanh đúng: 2 nốt cao
    osc.frequency.setValueAtTime(800, now);
    osc.frequency.setValueAtTime(1000, now + 0.1);
    gain.gain.setValueAtTime(0.3, now);
    gain.gain.setValueAtTime(0, now + 0.2);
    osc.start(now);
    osc.stop(now + 0.2);
  } else {
    // Âm thanh sai: 1 nốt thấp
    osc.frequency.setValueAtTime(400, now);
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.setValueAtTime(0, now + 0.3);
    osc.start(now);
    osc.stop(now + 0.3);
  }
}

function startQuiz(){
  document.getElementById('start').classList.remove('active');
  document.getElementById('quiz').classList.add('active');
  loadQ();
}

function loadQ(){
  let q = QS[qidx];
  document.getElementById('qnum').textContent = 'Câu ' + (qidx + 1) + '/30';
  document.getElementById('progfill').style.width = ((qidx / 30) * 100) + '%';
  document.getElementById('score').textContent = score + 'đ';
  
  let h = '<div class="q-text">' + q.q.replace(/\\n/g, '<br>') + '</div>';
  
  if(q.poem) h += '<div class="poetry">' + q.poem.replace(/\\n/g, '\n') + '</div>';
  if(q.ctx) h += '<div class="ctx-box">' + q.ctx.replace(/\\n/g, '<br>') + '</div>';
  if(q.img && IMAGES[q.img]) h += '<div class="img-container"><img src="' + IMAGES[q.img] + '" alt=""></div>';
  
  if(q.t === 'mcq') h += buildMCQ(q);
  else if(q.t === 'fill') h += buildFill(q);
  else if(q.t === 'fill2') h += buildFill2(q);
  else if(q.t === 'type') h += buildType(q);
  else if(q.t === 'match') h += buildMatch(q);
  else if(q.t === 'sort') h += buildSort(q);
  else if(q.t === 'classify') h += buildClassify(q);
  
  h += '<div class="fb" id="fb"></div>';
  document.getElementById('qcard').innerHTML = h;
  document.getElementById('btnnext').classList.remove('show');
}

function buildMCQ(q){
  let h = '<div class="opts">';
  if(q.oimg){
    q.o.forEach((o, i) => {
      let img = q.oimg[i] && IMAGES[q.oimg[i]] ? '<img src="' + IMAGES[q.oimg[i]] + '" class="opt-img">' : '';
      h += '<div class="opt" onclick="checkMCQ(' + i + ')" id="opt' + i + '"><span class="opt-lbl">' + 'ABCD'[i] + '</span><div>' + o + img + '</div></div>';
    });
  } else {
    q.o.forEach((o, i) => {
      h += '<div class="opt" onclick="checkMCQ(' + i + ')" id="opt' + i + '"><span class="opt-lbl">' + 'ABCD'[i] + '</span>' + o + '</div>';
    });
  }
  return h + '</div>';
}

function checkMCQ(i){
  let q = QS[qidx];
  document.querySelectorAll('.opt').forEach(e => e.classList.add('disabled'));
  let ok = (i === q.a);
  document.getElementById('opt' + i).classList.add(ok ? 'correct' : 'wrong');
  if(!ok) document.getElementById('opt' + q.a).classList.add('correct');
  if(ok) { score += 10; playSound(true); } else { playSound(false); }
  showFb(ok, q.fb);
}

function buildFill(q){
  let h = '<div class="pills">';
  if(q.o && q.o.length){
    q.o.forEach(o => h += '<div class="pill" onclick="checkFill(this)">' + o + '</div>');
  }
  return h + '</div>';
}

function checkFill(el){
  let q = QS[qidx];
  document.querySelectorAll('.pill').forEach(p => p.classList.add('disabled'));
  let ok = (el.textContent === q.a);
  el.classList.add(ok ? 'correct' : 'wrong');
  if(!ok && q.o) document.querySelectorAll('.pill').forEach(p => { if(p.textContent === q.a) p.classList.add('correct'); });
  if(ok) { score += 10; playSound(true); } else { playSound(false); }
  showFb(ok, q.fb);
}

function buildFill2(q){
  let h = '<div class="fill2-blanks">';
  if(q.blanks){
    q.blanks.forEach((b, i) => {
      h += '<div class="fill2-item"><div style="margin-bottom:6px">' + b.label + '</div>';
      h += '<div class="pills">';
      if(b.opts) b.opts.forEach(o => h += '<div class="pill" onclick="checkFill2(this,' + i + ')">' + o + '</div>');
      h += '</div></div>';
    });
  }
  return h + '</div>';
}

function checkFill2(el, idx){
  let q = QS[qidx];
  if(!q.blanks || !q.blanks[idx]) return;
  let b = q.blanks[idx];
  let ok = (el.textContent === b.a);
  el.classList.add(ok ? 'correct' : 'wrong');
  el.classList.add('disabled');
  if(!ok) document.querySelectorAll('.pill').forEach(p => { if(p.textContent === b.a) p.classList.add('correct'); });
  if(ok) { score += 10; playSound(true); } else { playSound(false); }
  showFb(ok, q.fb);
}

function buildType(q){
  return '<div class="type-row"><input class="type-input" id="typein" placeholder="Nhập đáp án..."><button class="btn-check" onclick="checkType()">Kiểm tra</button></div>';
}

function checkType(){
  let q = QS[qidx];
  let inp = document.getElementById('typein');
  let val = inp.value.trim().toLowerCase().replace(/\s+/g, ' ');
  let ans = (q.a + '').toLowerCase().replace(/\s+/g, ' ');
  let alts = (q.alts || []).map(a => a.toLowerCase().replace(/\s+/g, ' '));
  let ok = (val === ans || alts.includes(val));
  inp.disabled = true;
  inp.classList.add(ok ? 'correct' : 'wrong');
  if(ok) { score += 10; playSound(true); } else { playSound(false); }
  showFb(ok, q.fb);
}

function buildMatch(q){
  let h = '<div class="match-wrap">';
  h += '<div><div class="col-title">← Ghép từ</div>';
  if(q.left){
    q.left.forEach((item, i) => {
      h += '<div class="match-left-item" id="ml' + i + '" draggable="true" data-idx="' + i + '">';
      if(item.startsWith('13-') && IMAGES[item]) h += '<img src="' + IMAGES[item] + '" style="max-width:100%;border-radius:4px;margin-bottom:4px;height:60px;object-fit:cover">';
      else h += '<div class="match-left-label">' + item + '</div>';
      h += '</div>';
    });
  }
  h += '</div><div><div class="col-title">Kết quả →</div><div class="match-right-pool">';
  if(q.right){
    q.right.forEach((item, i) => {
      h += '<div class="drop-zone" id="dz' + i + '" data-right="' + i + '">' + item + '</div>';
    });
  }
  h += '</div></div></div>';
  h += '<button class="btn-match-check" onclick="checkMatch()">Kiểm tra</button>';
  return h;
}

function checkMatch(){
  let q = QS[qidx];
  if(!q.ans || !q.left) return;
  let ok = true;
  q.left.forEach((_, i) => {
    if(!q.ans[i] || q.ans[i].length === 0) return;
    let dzid = document.getElementById('dz' + q.ans[i][0]);
    if(!dzid) return;
    let draggedItem = document.querySelector('[data-idx="' + i + '"]');
    if(draggedItem && draggedItem.parentElement && draggedItem.parentElement.id === 'dz' + q.ans[i][0]){
      dzid.classList.add('match-correct');
    } else {
      ok = false;
      dzid.classList.add('match-wrong');
    }
  });
  document.querySelectorAll('[draggable]').forEach(e => e.draggable = false);
  if(ok) { score += 10; playSound(true); } else { playSound(false); }
  showFb(ok, q.fb);
}

function buildSort(q){
  let h = '<div class="sort-wrap" id="sortpool">';
  if(q.items){
    q.items.forEach((item, i) => {
      h += '<div class="sort-item" draggable="true" data-idx="' + i + '"><span class="sort-handle">⋮⋮</span>' + item + '</div>';
    });
  }
  h += '</div>';
  h += '<button class="btn-sort-check" onclick="checkSort()">Kiểm tra</button>';
  return h;
}

function checkSort(){
  let q = QS[qidx];
  if(!q.ans) return;
  let pool = document.getElementById('sortpool');
  let items = Array.from(pool.querySelectorAll('.sort-item')).map(e => parseInt(e.dataset.idx));
  let ok = JSON.stringify(items) === JSON.stringify(q.ans);
  pool.querySelectorAll('.sort-item').forEach((el, i) => {
    el.classList.add(q.ans[i] === parseInt(el.dataset.idx) ? 'correct' : 'wrong');
  });
  if(ok) { score += 10; playSound(true); } else { playSound(false); }
  showFb(ok, q.fb);
}

function buildClassify(q){
  let h = '<div class="classify-pool" id="clspool">';
  if(q.items){
    q.items.forEach((item, i) => {
      h += '<div class="cls-item" draggable="true" data-idx="' + i + '">' + item.substring(0, 25) + '</div>';
    });
  }
  h += '</div><div class="classify-buckets">';
  if(q.buckets){
    q.buckets.forEach((b, i) => {
      h += '<div class="bucket"><div class="bucket-title">' + b + '</div><div class="bucket-drop" id="bd' + i + '" data-bucket="' + i + '"></div></div>';
    });
  }
  h += '</div><button class="btn-cls-check" onclick="checkClassify()">Kiểm tra</button>';
  return h;
}

function checkClassify(){
  let q = QS[qidx];
  if(!q.ans || !q.buckets) return;
  let ok = true;
  q.buckets.forEach((_, i) => {
    let bd = document.getElementById('bd' + i);
    if(!bd) return;
    let items = Array.from(bd.querySelectorAll('.cls-item')).map(e => parseInt(e.dataset.idx)).sort((a,b)=>a-b);
    let expected = (q.ans[i] || []).slice().sort((a,b)=>a-b);
    let match = JSON.stringify(items) === JSON.stringify(expected);
    bd.classList.add(match ? 'match-correct' : 'match-wrong');
    if(!match) ok = false;
  });
  if(ok) { score += 10; playSound(true); } else { playSound(false); }
  showFb(ok, q.fb);
}

function showFb(ok, text){
  let fb = document.getElementById('fb');
  fb.textContent = text;
  fb.className = 'fb show ' + (ok ? 'ok' : 'no');
  document.getElementById('btnnext').classList.add('show');
}

function nextQ(){
  if(qidx < QS.length - 1){
    qidx++;
    loadQ();
    document.querySelector('.q-card').scrollIntoView({behavior:'smooth'});
  } else {
    alert('🎉 Hoàn thành!\nTổng điểm: ' + score + ' / 300');
    location.reload();
  }
}

// Drag & drop cho MATCH
let draggedEl = null;
document.addEventListener('dragstart', e => {
  if(e.target.classList.contains('match-left-item')){
    draggedEl = e.target;
    e.dataTransfer.effectAllowed = 'move';
  }
});

document.addEventListener('dragover', e => {
  if(e.target.classList.contains('drop-zone')){
    e.preventDefault();
    e.target.classList.add('drag-over');
  }
});

document.addEventListener('dragleave', e => {
  if(e.target.classList.contains('drop-zone')){
    e.target.classList.remove('drag-over');
  }
});

document.addEventListener('drop', e => {
  if(e.target.classList.contains('drop-zone') && draggedEl){
    e.preventDefault();
    e.target.innerHTML = '';
    let clone = draggedEl.cloneNode(true);
    clone.draggable = false;
    e.target.appendChild(clone);
    e.target.classList.remove('drag-over');
  }
});

// Drag & drop cho CLASSIFY + SORT
document.addEventListener('dragstart', e => {
  if(e.target.classList.contains('cls-item') || e.target.classList.contains('sort-item')){
    draggedEl = e.target;
    e.dataTransfer.effectAllowed = 'move';
  }
});

document.addEventListener('dragover', e => {
  if(e.target.classList.contains('bucket-drop') || e.target.classList.contains('sort-wrap')){
    e.preventDefault();
    e.target.classList.add('drag-over');
  }
});

document.addEventListener('dragleave', e => {
  if(e.target.classList.contains('bucket-drop') || e.target.classList.contains('sort-wrap')){
    e.target.classList.remove('drag-over');
  }
});

document.addEventListener('drop', e => {
  if(e.target.classList.contains('bucket-drop') && draggedEl && draggedEl.classList.contains('cls-item')){
    e.preventDefault();
    draggedEl.classList.add('in-bucket');
    e.target.appendChild(draggedEl);
    e.target.classList.remove('drag-over');
  } else if(e.target.classList.contains('sort-wrap') && draggedEl && draggedEl.classList.contains('sort-item')){
    e.preventDefault();
    let allItems = Array.from(e.target.querySelectorAll('.sort-item'));
    let dragIndex = allItems.indexOf(draggedEl);
    let insertIndex = allItems.findIndex(item => {
      let rect = item.getBoundingClientRect();
      return e.clientY < rect.top + rect.height / 2;
    });
    if(insertIndex === -1) insertIndex = allItems.length;
    if(dragIndex < insertIndex) insertIndex--;
    if(dragIndex !== insertIndex){
      e.target.insertBefore(draggedEl, allItems[insertIndex]);
    }
    e.target.classList.remove('drag-over');
  }
});
</script>
</body>
</html>
